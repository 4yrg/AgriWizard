_format_version: "3.0"

services:
  - name: iam-service
    url: http://iam-prod
    routes:
      - name: iam-route
        paths:
          - /api/iam
        strip_path: true
    plugins:
      - name: jwt
      - name: cors

  - name: hardware-service
    url: http://hardware-prod
    routes:
      - name: hardware-route
        paths:
          - /api/hardware
        strip_path: true
    plugins:
      - name: jwt
      - name: cors

  - name: analytics-service
    url: http://analytics-prod
    routes:
      - name: analytics-route
        paths:
          - /api/analytics
        strip_path: true
    plugins:
      - name: jwt
      - name: cors

  - name: weather-service
    url: http://weather-prod
    routes:
      - name: weather-route
        paths:
          - /api/weather
        strip_path: true
    plugins:
      - name: jwt
      - name: cors

  - name: notification-service
    url: http://notification-prod
    routes:
      - name: notification-route
        paths:
          - /api/notifications
        strip_path: true
    plugins:
      - name: jwt
      - name: cors

  - name: web-frontend
    url: http://web-prod
    routes:
      - name: web-route
        paths:
          - /
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - X-Kong-Upstream-Status
      credentials: true
      max_age: 3600