# ─────────────────────────────────────────────
#  AgriWizard — Development Compose Override
#  docker-compose.override.yml
# ─────────────────────────────────────────────
# Usage: docker compose --profile dev up
# This adds hot reload, debugging, and development tools

x-dev-env: &dev-env
  GIN_MODE: debug
  LOG_LEVEL: debug

services:
  # ────────────────────────────────────────────
  #  Development Services with Hot Reload
  # ────────────────────────────────────────────

  iam-service:
    build:
      context: .
      dockerfile: services/iam-service/Dockerfile.dev
      target: development
    environment:
      <<: *dev-env
    volumes:
      - ./services/iam-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hardware-service:
    build:
      context: .
      dockerfile: services/hardware-service/Dockerfile.dev
      target: development
    environment:
      <<: *dev-env
    volumes:
      - ./services/hardware-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile.dev
      target: development
    environment:
      <<: *dev-env
    volumes:
      - ./services/analytics-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  weather-service:
    build:
      context: .
      dockerfile: services/weather-service/Dockerfile.dev
      target: development
    environment:
      <<: *dev-env
    volumes:
      - ./services/weather-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile.dev
      target: development
    environment:
      <<: *dev-env
    volumes:
      - ./services/notification-service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ────────────────────────────────────────────
  #  Development Tools
  # ────────────────────────────────────────────

  # PostgreSQL admin UI (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agriwizard-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agriwizard.local
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - agriwizard-net
    ports:
      - "8099:80"
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: agriwizard-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - agriwizard-net
    ports:
      - "9090:9090"

  # Grafana dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: agriwizard-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - agriwizard-net
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ────────────────────────────────────────────
  #  Development Profiles
  # ────────────────────────────────────────────

profiles:
  monitoring:
    - prometheus
    - grafana
  admin:
    - pgadmin
  dev:
    - prometheus
    - grafana
    - pgadmin