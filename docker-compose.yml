version: "3.9"

# ─────────────────────────────────────────────
#  AgriWizard — Smart Greenhouse Monorepo
#  docker-compose.yml
# ─────────────────────────────────────────────

x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: agriwizard
  DB_PASSWORD: agriwizard_secret
  DB_NAME: agriwizard
  JWT_SECRET: super-secret-jwt-key-change-in-production
  GIN_MODE: release

networks:
  agriwizard-net:
    driver: bridge

volumes:
  postgres-data:
  nats-data:

services:
  # ────────────────────────────────────────────
  #  Infrastructure
  # ────────────────────────────────────────────

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: agriwizard-swagger-ui
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /app/swagger.yaml
    volumes:
      - ./swagger.yaml:/app/swagger.yaml:ro
    networks:
      - agriwizard-net
    ports:
      - "${SWAGGER_UI_PORT:-8090}:8080"

  postgres:
    image: postgres:16-alpine
    container_name: agriwizard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriwizard
      POSTGRES_PASSWORD: agriwizard_secret
      POSTGRES_DB: agriwizard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agriwizard-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriwizard -d agriwizard"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────
  #  Microservices
  # ────────────────────────────────────────────

  iam-service:
    build:
      context: ./services/iam-service
      dockerfile: Dockerfile
    container_name: agriwizard-iam
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8081"
      JWT_TTL_HOURS: "24"
    networks:
      - agriwizard-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iam.rule=PathPrefix(`/api/v1/iam`)"
      - "traefik.http.routers.iam.entrypoints=web"
      - "traefik.http.services.iam.loadbalancer.server.port=8081"
    ports:
      - "${IAM_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  hardware-service:
    build:
      context: ./services/hardware-service
      dockerfile: Dockerfile
    container_name: agriwizard-hardware
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8082"
      MQTT_BROKER: "${MQTT_BROKER}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      ANALYTICS_SERVICE_URL: "http://analytics-service:8083"
    networks:
      - agriwizard-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hardware.rule=PathPrefix(`/api/v1/hardware`)"
      - "traefik.http.routers.hardware.entrypoints=web"
      - "traefik.http.services.hardware.loadbalancer.server.port=8082"
    ports:
      - "${HARDWARE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: agriwizard-analytics
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8083"
      HARDWARE_SERVICE_URL: "http://hardware-service:8082"
      WEATHER_SERVICE_URL: "http://weather-service:8084"
    networks:
      - agriwizard-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analytics.rule=PathPrefix(`/api/v1/analytics`)"
      - "traefik.http.routers.analytics.entrypoints=web"
      - "traefik.http.services.analytics.loadbalancer.server.port=8083"
    ports:
      - "${ANALYTICS_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  weather-service:
    build:
      context: ./services/weather-service
      dockerfile: Dockerfile
    container_name: agriwizard-weather
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8084"
      USE_MOCK: "true" # Set to "false" and provide OWM_API_KEY for live data
      OWM_API_KEY: "" # Replace with your OpenWeatherMap API key
      OWM_BASE_URL: "https://api.openweathermap.org/data/2.5"
      LOCATION_LAT: "6.9271"
      LOCATION_LON: "79.8612"
      LOCATION_CITY: "Colombo"
    networks:
      - agriwizard-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.weather.rule=PathPrefix(`/api/v1/weather`)"
      - "traefik.http.routers.weather.entrypoints=web"
      - "traefik.http.services.weather.loadbalancer.server.port=8084"
    ports:
      - "${WEATHER_PORT:-8084}:8084"
    depends_on:
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────
  #  Message Queue & Notification Service
  # ────────────────────────────────────────────

  nats:
    image: nats:2.10-alpine
    container_name: agriwizard-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
    volumes:
      - nats-data:/data
    networks:
      - agriwizard-net
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: agriwizard-mailhog
    restart: unless-stopped
    networks:
      - agriwizard-net
    ports:
      - "1025:1025"
      - "8025:8025"

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: agriwizard-notification
    restart: unless-stopped
    environment:
      PORT: "8085"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: agriwizard
      DB_PASSWORD: agriwizard_secret
      DB_NAME: agriwizard
      NATS_URL: nats://nats:4222
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@agriwizard.local
    networks:
      - agriwizard-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification.rule=PathPrefix(`/api/v1/notifications`) || PathPrefix(`/api/v1/templates`)"
      - "traefik.http.routers.notification.entrypoints=web"
      - "traefik.http.services.notification.loadbalancer.server.port=8085"
    ports:
      - "${NOTIFICATION_PORT:-8085}:8085"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ────────────────────────────────────────────
  #  API Gateway (Traefik)
  # ────────────────────────────────────────────

  gateway:
    image: traefik:v3.0
    container_name: agriwizard-gateway
    restart: unless-stopped
    volumes:
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./gateway/routes.yml:/etc/traefik/routes.yml:ro
    networks:
      - agriwizard-net
    ports:
      - "8080:8080"
    depends_on:
      iam-service:
        condition: service_healthy
      hardware-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      weather-service:
        condition: service_healthy
    command: ["--configFile=/etc/traefik/traefik.yml"]
