# ─────────────────────────────────────────────
#  AgriWizard — Smart Greenhouse Monorepo
#  docker-compose.yml
# ─────────────────────────────────────────────

x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: agriwizard
  DB_PASSWORD: agriwizard_secret
  DB_NAME: agriwizard
  DB_SSLMODE: "${DB_SSLMODE:-disable}"
  JWT_SECRET: super-secret-jwt-key-change-in-production
  JWT_ISSUER: agriwizard-iam
  GIN_MODE: release

networks:
  agriwizard-net:
    driver: bridge

volumes:
  postgres-data:
  nats-data:

services:
  # ────────────────────────────────────────────
  #  Infrastructure
  # ────────────────────────────────────────────

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: agriwizard-swagger-ui
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /app/swagger.yaml
    volumes:
      - ./swagger.yaml:/app/swagger.yaml:ro
    networks:
      - agriwizard-net
    ports:
      - "${SWAGGER_UI_PORT:-8090}:8080"

  postgres:
    image: postgres:16-alpine
    container_name: agriwizard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriwizard
      POSTGRES_PASSWORD: agriwizard_secret
      POSTGRES_DB: agriwizard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agriwizard-net
    ports:
      - "8091:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriwizard -d agriwizard"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────
  #  Microservices
  # ────────────────────────────────────────────

  iam-service:
    build:
      context: .
      dockerfile: services/iam-service/Dockerfile
    container_name: agriwizard-iam
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8086"
      JWT_TTL_HOURS: "24"
    networks:
      - agriwizard-net
    ports:
      - "${IAM_PORT:-8081}:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  hardware-service:
    build:
      context: .
      dockerfile: services/hardware-service/Dockerfile
    container_name: agriwizard-hardware
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8087"
      MQTT_BROKER: "${MQTT_BROKER}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      ANALYTICS_SERVICE_URL: "http://analytics-service:8088"
    networks:
      - agriwizard-net
    ports:
      - "${HARDWARE_PORT:-8082}:8087"
    depends_on:
      postgres:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      kong:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: agriwizard-analytics
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8088"
      HARDWARE_SERVICE_URL: "http://hardware-service:8087"
      WEATHER_SERVICE_URL: "http://weather-service:8089"
    networks:
      - agriwizard-net
    ports:
      - "${ANALYTICS_PORT:-8083}:8088"
    depends_on:
      postgres:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      kong:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  weather-service:
    build:
      context: .
      dockerfile: services/weather-service/Dockerfile
    container_name: agriwizard-weather
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "8089"
      USE_MOCK: "true" # Set to "false" and provide OWM_API_KEY for live data
      OWM_API_KEY: "" # Replace with your OpenWeatherMap API key
      OWM_BASE_URL: "https://api.openweathermap.org/data/2.5"
      LOCATION_LAT: "6.9271"
      LOCATION_LON: "79.8612"
      LOCATION_CITY: "Colombo"
    networks:
      - agriwizard-net
    ports:
      - "${WEATHER_PORT:-8085}:8089"
    depends_on:
      iam-service:
        condition: service_healthy
      kong:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────
  #  Message Queue & Notification Service
  # ────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: agriwizard-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - agriwizard-net
    ports:
      - "${RABBITMQ_PORT:-8092}:5672"
      - "8093:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nats:
    image: nats:2.10-alpine
    container_name: agriwizard-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
    volumes:
      - nats-data:/data
    networks:
      - agriwizard-net
    ports:
      - "${NATS_PORT:-8094}:4222"
      - "8095:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: agriwizard-mailhog
    restart: unless-stopped
    networks:
      - agriwizard-net
    ports:
      - "8097:1025"
      - "8098:8025"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: agriwizard-notification
    restart: unless-stopped
    environment:
      PORT: "8091"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: agriwizard
      DB_PASSWORD: agriwizard_secret
      DB_NAME: agriwizard
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      NATS_URL: nats://nats:4222
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@agriwizard.local
    networks:
      - agriwizard-net
    ports:
      - "${NOTIFICATION_PORT:-8096}:8091"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      mailhog:
        condition: service_started
      kong:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ────────────────────────────────────────────
  #  API Gateway (Kong)
  # ────────────────────────────────────────────

  kong:
    build:
      context: .
      dockerfile: infrastructure/kong/Dockerfile
    container_name: agriwizard-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_LOG_LEVEL: info
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_JWT_SHARED_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-in-production}"
      KONG_JWT_ISSUER: "${JWT_ISSUER:-agriwizard-iam}"
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
      IAM_UPSTREAM_PROTOCOL: "http"
      IAM_UPSTREAM_HOST: iam-service
      IAM_UPSTREAM_PORT: "8086"
      HARDWARE_UPSTREAM_PROTOCOL: "http"
      HARDWARE_UPSTREAM_HOST: hardware-service
      HARDWARE_UPSTREAM_PORT: "8087"
      ANALYTICS_UPSTREAM_PROTOCOL: "http"
      ANALYTICS_UPSTREAM_HOST: analytics-service
      ANALYTICS_UPSTREAM_PORT: "8088"
      WEATHER_UPSTREAM_PROTOCOL: "http"
      WEATHER_UPSTREAM_HOST: weather-service
      WEATHER_UPSTREAM_PORT: "8089"
      NOTIFICATION_UPSTREAM_PROTOCOL: "http"
      NOTIFICATION_UPSTREAM_HOST: notification-service
      NOTIFICATION_UPSTREAM_PORT: "8091"
    networks:
      - agriwizard-net
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "8081:8443"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
