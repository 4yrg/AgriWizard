id: /subscriptions/71dc1447-483b-4aa3-b549-021a60ec7241/resourceGroups/agriwizard-prod-rg/providers/Microsoft.App/containerapps/agriwizard-prod-gateway
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? /subscriptions/71dc1447-483b-4aa3-b549-021a60ec7241/resourcegroups/agriwizard-prod-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/agriwizard-prod-aca-mi
    : clientId: 04e128ed-31d5-4ed9-9455-246f4cd8ec3d
      principalId: 281da310-fc46-4057-8a5d-891d8163694a
location: Central India
name: agriwizard-prod-gateway
properties:
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 8080
      transport: Auto
    registries:
    - identity: /subscriptions/71dc1447-483b-4aa3-b549-021a60ec7241/resourceGroups/agriwizard-prod-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/agriwizard-prod-aca-mi
      server: agriwizardacr7i7k3p7kcgay2.azurecr.io
  template:
    containers:
    - command:
      - /bin/sh
      args:
      - -c
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        worker_processes auto;
        events { worker_connections 1024; }
        http {
            include /etc/nginx/mime.types;
            merge_slashes on;
            server {
                listen 8080;
                server_name _;
                absolute_redirect off;
                port_in_redirect off;
                
                location /api/v1/iam {
                    rewrite ^/api/v1/iam/health/?$ /health break;
                    proxy_pass http://iam-prod;
                }
                location /api/v1/hardware {
                    rewrite ^/api/v1/hardware/health/?$ /health break;
                    proxy_pass http://hardware-prod;
                }
                location /api/v1/analytics {
                    rewrite ^/api/v1/analytics/health/?$ /health break;
                    proxy_pass http://analytics-prod;
                }
                location /api/v1/weather {
                    rewrite ^/api/v1/weather/health/?$ /health break;
                    proxy_pass http://weather-prod;
                }
                location /api/v1/notifications {
                    rewrite ^/api/v1/notifications/health/?$ /health break;
                    proxy_pass http://notification-prod;
                }
                location /api/v1/templates {
                    proxy_pass http://notification-prod;
                }
                location /health { return 200 "healthy\n"; }
            }
        }
        EOF
        nginx -g 'daemon off;'
      image: agriwizardacr7i7k3p7kcgay2.azurecr.io/agriwizard-gateway:latest
      name: agriwizard-prod-gateway
      resources:
        cpu: 0.5
        memory: 1Gi
    scale:
      maxReplicas: 3
      minReplicas: 1
resourceGroup: agriwizard-prod-rg
type: Microsoft.App/containerApps
