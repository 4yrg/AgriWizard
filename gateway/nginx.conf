            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
