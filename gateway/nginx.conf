worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    proxy_buffering off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 8080;
        server_name _;

        location /api/v1/iam/ {
            proxy_pass http://iam-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80/;
            proxy_http_version 1.1;
            proxy_set_header Host iam-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/hardware/ {
            proxy_pass http://hardware-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80/;
            proxy_http_version 1.1;
            proxy_set_header Host hardware-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/analytics/ {
            proxy_pass http://analytics-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80/;
            proxy_http_version 1.1;
            proxy_set_header Host analytics-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/weather/ {
            proxy_pass http://weather-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80/;
            proxy_http_version 1.1;
            proxy_set_header Host weather-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/notifications/ {
            proxy_pass http://notification-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80/;
            proxy_http_version 1.1;
            proxy_set_header Host notification-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}