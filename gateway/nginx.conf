worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    proxy_buffering off;

    server {
        listen 8080;
        server_name _;

        location /api/v1/iam/ {
            proxy_pass https://iam-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/iam/health {
            proxy_pass https://iam-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io/health;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/v1/hardware/ {
            proxy_pass https://hardware-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/hardware/health {
            proxy_pass https://hardware-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io/health;
            proxy_ssl_server_name on;
