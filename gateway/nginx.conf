worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    proxy_buffering off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    sub_filter_once off;
    sub_filter_types text/html text/plain text/xml;
    sub_filter 'https://iam-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io' 'https://agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io/api/v1/iam';
    sub_filter 'https://hardware-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io' 'https://agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io/api/v1/hardware';
    sub_filter 'https://analytics-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io' 'https://agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io/api/v1/analytics';
    sub_filter 'https://weather-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io' 'https://agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io/api/v1/weather';
    sub_filter 'https://notification-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io' 'https://agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io/api/v1/notifications';

    server {
        listen 8080;
        server_name _;

location /api/v1/iam/ {
            proxy_pass https://iam-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/hardware/ {
            proxy_pass https://hardware-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/analytics/ {
            proxy_pass https://analytics-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/weather/ {
            proxy_pass https://weather-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/notifications/ {
            proxy_pass https://notification-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/hardware/ {
            proxy_pass http://hardware-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80;
            proxy_http_version 1.1;
            proxy_set_header Host hardware-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/analytics/ {
            proxy_pass http://analytics-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80;
            proxy_http_version 1.1;
            proxy_set_header Host analytics-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/weather/ {
            proxy_pass http://weather-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80;
            proxy_http_version 1.1;
            proxy_set_header Host weather-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/notifications/ {
            proxy_pass http://notification-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io:80;
            proxy_http_version 1.1;
            proxy_set_header Host notification-prod.internal.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}