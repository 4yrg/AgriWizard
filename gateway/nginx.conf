worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    merge_slashes on;

    client_header_buffer_size 16k;
    large_client_header_buffers 4 128k;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    proxy_buffering off;

    server {
        listen 8080;
        server_name _;
        absolute_redirect off;
        port_in_redirect off;

        location = / {
            return 302 /health;
        }

        # ---------------------------------------------------------
        # IAM Service
        # ---------------------------------------------------------
        location = /api/v1/iam {
            return 301 /api/v1/iam/;
        }

        location ^~ /api/v1/iam/ {
            rewrite ^/api/v1/iam/health/?$ /health break;
            proxy_pass https://${IAM_SERVICE_HOST};
            proxy_set_header Host ${IAM_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/iam/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Hardware Service
        # ---------------------------------------------------------
        location = /api/v1/hardware {
            return 301 /api/v1/hardware/;
        }

        location ^~ /api/v1/hardware/ {
            rewrite ^/api/v1/hardware/health/?$ /health break;
            proxy_pass https://${HARDWARE_SERVICE_HOST};
            proxy_set_header Host ${HARDWARE_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/hardware/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Analytics Service
        # ---------------------------------------------------------
        location = /api/v1/analytics {
            return 301 /api/v1/analytics/;
        }

        location ^~ /api/v1/analytics/ {
            rewrite ^/api/v1/analytics/health/?$ /health break;
            proxy_pass https://${ANALYTICS_SERVICE_HOST};
            proxy_set_header Host ${ANALYTICS_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/analytics/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Weather Service
        # ---------------------------------------------------------
        location = /api/v1/weather {
            return 301 /api/v1/weather/;
        }

        location ^~ /api/v1/weather/ {
            rewrite ^/api/v1/weather/health/?$ /health break;
            proxy_pass https://${WEATHER_SERVICE_HOST};
            proxy_set_header Host ${WEATHER_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/weather/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Notification Service
        # ---------------------------------------------------------
        location = /api/v1/notifications {
            return 301 /api/v1/notifications/;
        }

        location ^~ /api/v1/notifications/ {
            rewrite ^/api/v1/notifications/health/?$ /health break;
            proxy_pass https://${NOTIFICATION_SERVICE_HOST};
            proxy_set_header Host ${NOTIFICATION_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/notifications/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Templates Service (routed via Notification Service)
        # ---------------------------------------------------------
        location = /api/v1/templates {
            return 301 /api/v1/templates/;
        }

        location ^~ /api/v1/templates/ {
            proxy_pass https://${NOTIFICATION_SERVICE_HOST};
            proxy_set_header Host ${NOTIFICATION_SERVICE_HOST};
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 2;
            proxy_redirect ~^https?://[^/]+(/api/v1/templates/.*)$ $1;
        }

        # ---------------------------------------------------------
        # Health Check
        # ---------------------------------------------------------
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}