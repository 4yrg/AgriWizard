            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/v1/weather/ {
            proxy_pass https://weather-prod.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Forwarded-Host agriwizard-prod-gateway.yellowocean-38e04fed.centralindia.azurecontainerapps.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/weather/health {
