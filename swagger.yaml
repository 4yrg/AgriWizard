openapi: "3.0.3"
info:
  title: AgriWizard — Smart Greenhouse Management API
  description: |
    Complete REST API for the AgriWizard microservice ecosystem.
    All protected endpoints require a Bearer JWT token obtained from the IAM service `/login` endpoint.

    ## Services
    | Service | Port | Description |
    |---------|------|-------------|
    | IAM Service | 8081 | Authentication & RBAC |
    | Hardware Service | 8082 | IoT device management & MQTT control |
    | Analytics Service | 8083 | Threshold rules & decision logic |
    | Weather Service | 8084 | External weather intelligence |
    | KrakenD Gateway | 8080 | Unified entry point (all routes via `/api/v1/...`) |

    ## Authentication Flow
    1. `POST /api/v1/iam/register` — Create an account
    2. `POST /api/v1/iam/login` — Obtain JWT token
    3. Include `Authorization: Bearer <token>` on all subsequent requests
  version: "1.0.0"
  contact:
    name: AgriWizard Team
    email: support@agriwizard.io
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development (via KrakenD gateway)
  - url: http://localhost:8081
    description: IAM Service (direct)
  - url: http://localhost:8082
    description: Hardware Service (direct)
  - url: http://localhost:8083
    description: Analytics Service (direct)
  - url: http://localhost:8085
    description: Weather Service (direct)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from `/api/v1/iam/login`

  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: field 'email' is required

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object

    # ── IAM ─────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          example: farmer@greenhouse.lk
        password:
          type: string
          minLength: 8
          example: Passw0rd!
        full_name:
          type: string
          example: Kamal Perera
        phone:
          type: string
          example: "+94771234567"
        role:
          type: string
          enum: [Admin, Agromist]
          default: Agromist

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserDTO"

    UserDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [Admin, Agromist]

    IntrospectResponse:
      type: object
      properties:
        valid:
          type: boolean
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
        expires_at:
          type: integer
          format: int64

    # ── Hardware ─────────────────────────────────────────────────────

    CreateEquipmentRequest:
      type: object
      required: [name, supported_operations]
      properties:
        name:
          type: string
          example: Main Water Pump
        supported_operations:
          type: array
          items:
            type: string
          example: [ON, OFF, REVERSE]
        api_url:
          type: string
          example: http://192.168.1.10/control

    Equipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        supported_operations:
          type: array
          items:
            type: string
        mqtt_topic:
          type: string
          example: agriwizard/equipment/abc123/command
        api_url:
          type: string
        current_status:
          type: string
          enum: [ON, OFF, LOCKED, DISABLED]
        created_at:
          type: string
          format: date-time

    ControlCommand:
      type: object
      required: [operation]
      properties:
        operation:
          type: string
          example: ON
        payload:
          type: object
          additionalProperties: true

    CreateSensorRequest:
      type: object
      required: [name, parameter_ids]
      properties:
        name:
          type: string
          example: Zone A Soil Probe
        parameter_ids:
          type: array
          items:
            type: string
          example: [soil_moisture_pct, soil_temp_c]
        api_url:
          type: string
        update_frequency_seconds:
          type: integer
          default: 60

    Sensor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parameter_ids:
          type: array
          items:
            type: string
        mqtt_topic:
          type: string
          example: agriwizard/sensor/xyz789/telemetry
        update_frequency_seconds:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateParameterRequest:
      type: object
      required: [id, unit]
      properties:
        id:
          type: string
          example: soil_moisture_pct
        unit:
          type: string
          example: "%"
        description:
          type: string
          example: Volumetric soil moisture percentage

    TelemetryPayload:
      type: object
      required: [sensor_id, readings]
      properties:
        sensor_id:
          type: string
          format: uuid
        readings:
          type: array
          items:
            type: object
            properties:
              parameter_id:
                type: string
                example: soil_moisture_pct
              value:
                type: number
                format: double
                example: 42.5
        timestamp:
          type: string
          format: date-time

    # ── Analytics ─────────────────────────────────────────────────────

    UpsertThresholdRequest:
      type: object
      required: [parameter_id, max_value]
      properties:
        parameter_id:
          type: string
          example: soil_moisture_pct
        min_value:
          type: number
          example: 30.0
        max_value:
          type: number
          example: 70.0
        is_enabled:
          type: boolean
          default: true

    Threshold:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parameter_id:
          type: string
        min_value:
          type: number
        max_value:
          type: number
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRuleRequest:
      type: object
      required: [threshold_id, equipment_id, low_action, high_action]
      properties:
        threshold_id:
          type: string
          format: uuid
        equipment_id:
          type: string
          format: uuid
        low_action:
          type: string
          example: ON
          description: Command to send when value < min_value
        high_action:
          type: string
          example: OFF
          description: Command to send when value > max_value

    AutomationRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        threshold_id:
          type: string
        equipment_id:
          type: string
        low_action:
          type: string
        high_action:
          type: string
        created_at:
          type: string
          format: date-time

    DecisionTableEntry:
      type: object
      properties:
        parameter_id:
          type: string
        threshold:
          $ref: "#/components/schemas/Threshold"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/AutomationRule"
        latest_value:
          type: number
          nullable: true
        status:
          type: string
          enum: [NORMAL, LOW, HIGH, NO_DATA]

    # ── Weather ─────────────────────────────────────────────────────

    WeatherCondition:
      type: object
      properties:
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            city_name:
              type: string
        temperature_celsius:
          type: number
          example: 32.4
        humidity_percent:
          type: number
          example: 78.0
        wind_speed_kmh:
          type: number
          example: 12.0
        description:
          type: string
          example: partly cloudy
        fetched_at:
          type: string
          format: date-time

    IrrigationRecommendation:
      type: object
      properties:
        scale:
          type: number
          format: double
          example: 1.2
          description: "Multiply standard irrigation duration by this value. 0 = skip entirely."
        reason:
          type: string
          example: "Hot conditions (36.1°C) — increase irrigation by 20%"
        current_temperature_celsius:
          type: number
          example: 36.1
        rain_chance_percent:
          type: number
          example: 15.0

paths:

  # ══════════════════════════════════════════════════════════════════
  #  IAM Service
  # ══════════════════════════════════════════════════════════════════

  /api/v1/iam/register:
    post:
      summary: Register a new user
      tags: [IAM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/iam/login:
    post:
      summary: Authenticate and receive JWT
      tags: [IAM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/iam/introspect:
    get:
      summary: Validate a JWT token
      description: Used by other services to verify token authenticity
      tags: [IAM]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Introspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"

  /api/v1/iam/profile:
    get:
      summary: Get current user profile
      tags: [IAM]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update user profile
      tags: [IAM]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                phone:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ══════════════════════════════════════════════════════════════════
  #  Hardware Service
  # ══════════════════════════════════════════════════════════════════

  /api/v1/hardware/equipments:
    post:
      summary: Register a new equipment controller
      tags: [Hardware — Equipment]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEquipmentRequest"
      responses:
        "201":
          description: Equipment registered, MQTT topic assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List all registered equipment
      tags: [Hardware — Equipment]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Equipment"

  /api/v1/hardware/control/{id}:
    post:
      summary: Dispatch a command to equipment via MQTT
      tags: [Hardware — Equipment]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlCommand"
      responses:
        "200":
          description: Command dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Equipment is LOCKED or DISABLED

  /api/v1/hardware/sensors:
    post:
      summary: Provision a new sensor device
      tags: [Hardware — Sensors]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSensorRequest"
      responses:
        "201":
          description: Sensor provisioned, MQTT topic assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    get:
      summary: Get all sensors with their parameter definitions
      tags: [Hardware — Sensors]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Sensor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/hardware/parameters:
    post:
      summary: Define a new measurable parameter type
      tags: [Hardware — Parameters]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParameterRequest"
      responses:
        "201":
          description: Parameter defined
    get:
      summary: List all parameter definitions
      tags: [Hardware — Parameters]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Parameter list

  /api/v1/hardware/telemetry:
    post:
      summary: Ingest telemetry via REST (alternative to MQTT)
      tags: [Hardware — Telemetry]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryPayload"
      responses:
        "201":
          description: Telemetry stored and forwarded to analytics

  # ══════════════════════════════════════════════════════════════════
  #  Analytics Service
  # ══════════════════════════════════════════════════════════════════

  /api/v1/analytics/thresholds:
    post:
      summary: Create or update a threshold range for a parameter
      tags: [Analytics — Thresholds]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertThresholdRequest"
      responses:
        "200":
          description: Threshold saved (created or updated)

  /api/v1/analytics/thresholds/{parameterId}:
    get:
      summary: Get threshold bounds for a specific parameter
      tags: [Analytics — Thresholds]
      security:
        - BearerAuth: []
      parameters:
        - name: parameterId
          in: path
          required: true
          schema:
            type: string
          example: soil_moisture_pct
      responses:
        "200":
          description: Threshold definition
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Threshold"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/analytics/rules:
    post:
      summary: Create an automation rule linking threshold to equipment
      tags: [Analytics — Rules]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "201":
          description: Rule created

  /api/v1/analytics/rules/{parameterId}:
    get:
      summary: Get automation rules linked to a parameter's threshold
      tags: [Analytics — Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: parameterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Automation rules
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AutomationRule"

  /api/v1/analytics/decisions/summary:
    get:
      summary: Get the full decision table for all enabled thresholds
      tags: [Analytics — Decisions]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Decision table
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DecisionTableEntry"

  /api/v1/analytics/ingest:
    post:
      summary: Receive raw telemetry and apply threshold logic
      description: Called internally by the Hardware Service. Evaluates thresholds and triggers equipment automation.
      tags: [Analytics — Ingest]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryPayload"
      responses:
        "200":
          description: Telemetry processed, automation decisions returned

  /api/v1/analytics/summaries:
    get:
      summary: Get daily aggregated summaries for all parameters
      tags: [Analytics — Summaries]
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          example: "2026-03-21"
          description: Date to query (defaults to today)
      responses:
        "200":
          description: Daily summaries

  # ══════════════════════════════════════════════════════════════════
  #  Weather Service
  # ══════════════════════════════════════════════════════════════════

  /api/v1/weather/current:
    get:
      summary: Get live local weather data
      tags: [Weather]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current weather conditions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WeatherCondition"

  /api/v1/weather/forecast:
    get:
      summary: Get 24-hour precipitation and temperature forecast
      tags: [Weather]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Weather forecast entries

  /api/v1/weather/alerts:
    get:
      summary: Check for active extreme weather warnings
      tags: [Weather]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Active weather alerts (may be empty array)

  /api/v1/weather/recommendations:
    get:
      summary: Get irrigation scale factor based on temperature and rain forecast
      tags: [Weather]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Irrigation recommendation with scale factor
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/IrrigationRecommendation"

tags:
  - name: IAM
    description: Identity & Access Management — user registration, login, and token validation
  - name: Hardware — Equipment
    description: Register and control actuator devices (pumps, fans, valves)
  - name: Hardware — Sensors
    description: Provision sensor devices and manage their telemetry subscriptions
  - name: Hardware — Parameters
    description: Define measurable metric types (e.g. soil_moisture_pct)
  - name: Hardware — Telemetry
    description: REST-based telemetry ingestion (MQTT is the primary channel)
  - name: Analytics — Thresholds
    description: Define safe operating ranges for sensor parameters
  - name: Analytics — Rules
    description: Map threshold breaches to equipment automation actions
  - name: Analytics — Decisions
    description: View the consolidated decision table and current system status
  - name: Analytics — Ingest
    description: Internal endpoint for processing incoming telemetry
  - name: Analytics — Summaries
    description: Daily aggregated statistics for all monitored parameters
  - name: Weather
    description: External weather intelligence, forecasts, alerts, and irrigation recommendations
