_format_version: "3.0"
_transform: true

services:
  - name: iam-service
    url: http://prod-iam-service
    routes:
      - name: iam-route
        paths: ["/api/v1/iam"]
        strip_path: true

  - name: hardware-service
    url: http://prod-hardware-service
    routes:
      - name: hardware-route
        paths: ["/api/v1/hardware"]
        strip_path: true

  - name: analytics-service
    url: http://prod-analytics-service
    routes:
      - name: analytics-route
        paths: ["/api/v1/analytics"]
        strip_path: true

  - name: weather-service
    url: http://prod-weather-service
    routes:
      - name: weather-route
        paths: ["/api/v1/weather"]
        strip_path: true

  - name: notification-service
    url: http://prod-notification-service
    routes:
      - name: notification-route
        paths: ["/api/v1/notifications"]
        strip_path: true

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      headers: ["Authorization", "Content-Type"]
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      policy: local
      fault_tolerant: true