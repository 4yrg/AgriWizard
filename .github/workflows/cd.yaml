name: CD - Build & Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag override'
        required: false
        type: string

env:
  REGISTRY: agriwizardacr.azurecr.io
  REGISTRY_NAME: agriwizardacr
  RESOURCE_GROUP: agriwizard-rg
  SUBSCRIPTION_ID: 71dc1447-483b-4aa3-b549-021a60ec7241
  LOCATION: centralindia
  ENVIRONMENT: agriwizard-aca-env
  FQDN_SUFFIX: purplesand-4413bcdd.centralindia.azurecontainerapps.io

jobs:
  determine-tag:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event.inputs.image_tag }}" != "" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          echo "========================================"
          echo "Deploying with image tag: ${{ steps.tag.outputs.tag }}"
          echo "========================================"

  build-push-services:
    name: Build & Push Service Images
    needs: determine-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iam-service
            context: .
            dockerfile: services/iam-service/Dockerfile
            port: 8081
          - name: hardware-service
            context: .
            dockerfile: services/hardware-service/Dockerfile
            port: 8082
          - name: analytics-service
            context: .
            dockerfile: services/analytics-service/Dockerfile
            port: 8083
          - name: weather-service
            context: .
            dockerfile: services/weather-service/Dockerfile
            port: 8084
          - name: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
            port: 8085
          - name: kong
            context: .
            dockerfile: infrastructure/kong/Dockerfile
            port: 8000
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/agriwizard-${{ matrix.name }}:${{ needs.determine-tag.outputs.tag }}
            ${{ env.REGISTRY }}/agriwizard-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-services:
    name: Deploy Services
    needs: [determine-tag, build-push-services]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ env.SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        id: acr-creds
        run: |
          echo "password=$(az acr credential show -n ${{ env.REGISTRY_NAME }} --query passwords[0].value -o tsv)" >> $GITHUB_OUTPUT

      - name: Deploy IAM Service
        run: |
          az containerapp up \
            --name iam-service -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-iam-service:latest \
            --ingress external --target-port 8081 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "PORT=8081" "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=5432" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_SSLMODE=require" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "JWT_ISSUER=agriwizard-iam" "JWT_TTL_HOURS=24" "GIN_MODE=release"

      - name: Deploy Hardware Service
        run: |
          az containerapp up \
            --name hardware-service -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-hardware-service:latest \
            --ingress external --target-port 8082 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "PORT=8082" "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=5432" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_SSLMODE=require" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "ANALYTICS_SERVICE_URL=https://analytics-service.${{ env.FQDN_SUFFIX }}" "MQTT_BROKER=${{ secrets.MQTT_BROKER }}" "MQTT_USERNAME=${{ secrets.MQTT_USERNAME }}" "MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}" "GIN_MODE=release"

      - name: Deploy Analytics Service
        run: |
          az containerapp up \
            --name analytics-service -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-analytics-service:latest \
            --ingress external --target-port 8083 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "PORT=8083" "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=5432" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_SSLMODE=require" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "HARDWARE_SERVICE_URL=https://hardware-service.${{ env.FQDN_SUFFIX }}" "WEATHER_SERVICE_URL=https://weather-service.${{ env.FQDN_SUFFIX }}" "GIN_MODE=release"

      - name: Deploy Weather Service
        run: |
          az containerapp up \
            --name weather-service -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-weather-service:latest \
            --ingress external --target-port 8084 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "PORT=8084" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "USE_MOCK=true" "OWM_API_KEY=" "OWM_BASE_URL=https://api.openweathermap.org/data/2.5" "LOCATION_LAT=6.9271" "LOCATION_LON=79.8612" "LOCATION_CITY=Colombo" "GIN_MODE=release"

      - name: Deploy Notification Service
        run: |
          az containerapp up \
            --name notification-service -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-notification-service:latest \
            --ingress external --target-port 8085 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "PORT=8085" "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=5432" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_SSLMODE=require" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "SMTP_HOST=${{ secrets.SMTP_HOST }}" "SMTP_PORT=587" "SMTP_FROM=${{ secrets.SMTP_FROM }}" "SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}" "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" "GIN_MODE=release"

      - name: Deploy Kong Gateway
        run: |
          az containerapp up \
            --name kong-gateway -g ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ENVIRONMENT }} \
            --image ${{ env.REGISTRY }}/agriwizard-kong:latest \
            --ingress external --target-port 8000 \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --env-vars "KONG_DATABASE=off" "KONG_PROXY_LISTEN=0.0.0.0:8000" "KONG_ADMIN_LISTEN=127.0.0.1:8001" "KONG_LOG_LEVEL=info" "KONG_JWT_SHARED_SECRET=${{ secrets.JWT_SECRET }}" "CORS_ALLOW_ORIGIN=*" "ACA_FQDN_SUFFIX=${{ env.FQDN_SUFFIX }}" "IAM_UPSTREAM_HOST=https://iam-service.${{ env.FQDN_SUFFIX }}" "IAM_UPSTREAM_PORT=443" "HARDWARE_UPSTREAM_HOST=https://hardware-service.${{ env.FQDN_SUFFIX }}" "HARDWARE_UPSTREAM_PORT=443" "ANALYTICS_UPSTREAM_HOST=https://analytics-service.${{ env.FQDN_SUFFIX }}" "ANALYTICS_UPSTREAM_PORT=443" "WEATHER_UPSTREAM_HOST=https://weather-service.${{ env.FQDN_SUFFIX }}" "WEATHER_UPSTREAM_PORT=443" "NOTIFICATION_UPSTREAM_HOST=https://notification-service.${{ env.FQDN_SUFFIX }}" "NOTIFICATION_UPSTREAM_PORT=443"

  summary:
    name: Deployment Summary
    needs: [determine-tag, deploy-services]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "Deployment Results"
          echo "========================================"
          echo "Image tag: ${{ needs.determine-tag.outputs.tag }}"
          echo ""
          echo "Services deployed:"
          echo "  - iam-service"
          echo "  - hardware-service"
          echo "  - analytics-service"
          echo "  - weather-service"
          echo "  - notification-service"
          echo "  - kong-gateway"
          echo ""
          if [[ "${{ needs.deploy-services.result }}" == "failure" ]]; then
            echo "Deployment FAILED"
            exit 1
          else
            echo "Deployment completed successfully!"
          fi
