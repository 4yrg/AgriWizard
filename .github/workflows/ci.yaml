name: CI - Lint & Test

on:
  pull_request:
    branches: [main, development]
  workflow_dispatch:

env:
  GO_VERSION: "1.26.1"

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - iam-service
          - hardware-service
          - analytics-service
          - weather-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: services/${{ matrix.service }}
          args: --timeout=5m --config=../../.golangci.yml

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose --file docker-compose.yml build \
            --parallel \
            --quiet

      - name: Verify containers start
        run: |
          docker compose --file docker-compose.yml up -d
          echo "Waiting for services to start..."
          sleep 20
          
          echo "Checking IAM service..."
          curl -sf http://localhost:8081/health || exit 1
          
          echo "Checking Hardware service..."
          curl -sf http://localhost:8082/health || exit 1
          
          echo "Checking Analytics service..."
          curl -sf http://localhost:8083/health || exit 1
          
          echo "Checking Weather service..."
          curl -sf http://localhost:8084/health || exit 1
          
          echo "Checking Kong gateway..."
          curl -sf http://localhost:8001/status || exit 1

      - name: Cleanup
        if: always()
        run: docker compose --file docker-compose.yml down -v

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sonarcloud:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event_repository.private == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  gosec-scan:
    name: GoSec Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt json -out gosec-results.json ./services/..."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-results.json

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-go, docker-build, trivy-scan, sonarcloud, gosec-scan]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "CI Pipeline Results"
          echo "========================================"
          echo ""
          echo "Lint (Go): ${{ needs.lint-go.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Trivy Scan: ${{ needs.trivy-scan.result }}"
          echo "SonarQube: ${{ needs.sonarcloud.result }}"
          echo "GoSec: ${{ needs.gosec-scan.result }}"
          echo ""
          
          if [[ "${{ needs.lint-go.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
