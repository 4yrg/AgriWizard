name: Deploy Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ vars.ACR_NAME }}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify Go formatting
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l ./services)" ]; then
            echo "Go files are not formatted:"
            gofmt -l ./services
            exit 1
          fi

      - name: Run Go vet
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go vet "${module}/..."
          done

      - name: Run frontend lint
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run lint

      - name: Run Go tests
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go test "${module}/..."
          done

      - name: Frontend build verification
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run build

  deploy-bootstrap:
    name: Provision ACR & Identity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bootstrap Infra
        run: |
          set -euo pipefail
          az deployment sub create \
            --name "bootstrap-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/bootstrap-acr.bicep \
            --parameters \
              namePrefix=${{ vars.AZURE_NAME_PREFIX || 'agriwizard' }} \
              location=${{ vars.AZURE_REGION }} \
              acrName=${{ vars.ACR_NAME }} \
            -o json

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy-bootstrap
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
          - service: web
            image_name: agriwizard-web
            dockerfile: client/Dockerfile
            context: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      resource_group: ${{ steps.rg.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

      - name: What-if infrastructure changes
        id: whatif
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SERVICE_BUS_CONNECTION: ${{ secrets.SERVICE_BUS_CONNECTION }}
        run: |
          set -euo pipefail
          az deployment sub what-if \
            --name "whatif-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/main.bicep \
            --parameters \
              infra/main.bicepparam \
              acrName=${{ vars.ACR_NAME }} \
            --result-format FullResourcePayloads \
            -o json > whatif.json || true
          
          if [ ! -s whatif.json ]; then
            echo "changes=0" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGES="$(jq '[.changes[]? | select(.changeType != "NoChange")] | length' whatif.json || echo "0")"
          echo "changes=${CHANGES}" >> "${GITHUB_OUTPUT}"
          if [ "${CHANGES}" -eq 0 ]; then
            echo "No infrastructure changes" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Deploy infrastructure
        if: steps.whatif.outputs.changes != '0'
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SERVICE_BUS_CONNECTION: ${{ secrets.SERVICE_BUS_CONNECTION }}
        run: |
          set -euo pipefail
          az deployment sub create \
            --name "deploy-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/main.bicep \
            --parameters \
              infra/main.bicepparam \
              acrName=${{ vars.ACR_NAME }} \
            -o json > deployment.json
          echo "Infrastructure deployment completed." >> "${GITHUB_STEP_SUMMARY}"
          echo '```json' >> "${GITHUB_STEP_SUMMARY}"
          jq '.properties.outputs' deployment.json >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Resolve resource group output
        id: rg
        run: |
          set -euo pipefail
          RG_VALUE="$(az deployment sub show \
            --name "deploy-${GITHUB_RUN_ID}" \
            --query "properties.outputs.resourceGroupName.value" -o tsv 2>/dev/null || true)"
          if [ -z "${RG_VALUE}" ]; then
            RG_VALUE="${{ vars.AZURE_RESOURCE_GROUP_PRODUCTION }}"
          fi
          echo "value=${RG_VALUE}" >> "${GITHUB_OUTPUT}"

  deploy-app:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy-infra
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            port: "8088"
          - service: weather
            image_name: agriwizard-weather
            port: "8089"
          - service: notification
            image_name: agriwizard-notification
            port: "8091"
          - service: web
            image_name: agriwizard-web
            port: "3000"
    env:
      RG: ${{ needs.deploy-infra.outputs.resource_group }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ matrix.service }}-prod
          resourceGroup: ${{ env.RG }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}

      - name: Apply secrets and env vars
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ matrix.service }}-prod"
          RG="${{ env.RG }}"
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}"

          az containerapp secret set \
            --name "${APP_NAME}" \
            --resource-group "${RG}" \
            --secrets \
              db-password="${{ secrets.DB_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              mqtt-password="${{ secrets.MQTT_PASSWORD }}" \
              owm-api-key="${{ secrets.OWM_API_KEY }}" \
              smtp-password="${{ secrets.SMTP_PASSWORD }}" \
              service-bus-connection="${{ secrets.SERVICE_BUS_CONNECTION }}"

          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${RG}" \
            --image "${IMAGE}" \
            --target-port "${{ matrix.port }}" \
            --ingress external \
            --cpu "0.5" \
            --memory "1Gi" \
            --min-replicas "1" \
            --max-replicas "3" \
            --set-env-vars \
              PORT="${{ matrix.port }}" \
              DB_PORT="${{ vars.DB_PORT }}" \
              DB_NAME="${{ vars.DB_NAME }}" \
              DB_SSLMODE="${{ vars.DB_SSLMODE }}" \
              JWT_ISSUER="${{ vars.JWT_ISSUER }}" \
              OWM_BASE_URL="${{ vars.OWM_BASE_URL }}" \
              LOCATION_LAT="${{ vars.LOCATION_LAT }}" \
              LOCATION_LON="${{ vars.LOCATION_LON }}" \
              LOCATION_CITY="${{ vars.LOCATION_CITY }}" \
              USE_MOCK="${{ vars.USE_MOCK }}" \
              NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
              NEXT_PUBLIC_BASE_PATH="${{ vars.NEXT_PUBLIC_BASE_PATH }}" \
              DB_PASSWORD=secretref:db-password \
              JWT_SECRET=secretref:jwt-secret \
              MQTT_PASSWORD=secretref:mqtt-password \
              OWM_API_KEY=secretref:owm-api-key \
              SMTP_PASSWORD=secretref:smtp-password \
              SERVICE_BUS_CONNECTION=secretref:service-bus-connection

      - name: Wait for active revision
        run: |
          set -euo pipefail
          APP_NAME="${{ matrix.service }}-prod"
          RG="${{ env.RG }}"
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}"
          END_TS="$(( $(date +%s) + 300 ))"
          while [ "$(date +%s)" -lt "${END_TS}" ]; do
            ACTIVE_COUNT="$(az containerapp revision list \
              --name "${APP_NAME}" \
              --resource-group "${RG}" \
              --query "[?properties.active==\`true\` && properties.template.containers[0].image=='${IMAGE}'] | length(@)" \
              -o tsv)"
            if [ "${ACTIVE_COUNT}" = "1" ]; then
              echo "Revision with image ${IMAGE} is active."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for active revision of ${APP_NAME}." >&2
          exit 1

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-app
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: [iam, hardware, analytics, weather, notification, web]
    steps:
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test service endpoint
        run: |
          set -euo pipefail
          APP_NAME="${{ matrix.service }}-prod"
          RG="${{ vars.AZURE_RESOURCE_GROUP_PRODUCTION }}"
          FQDN="$(az containerapp show --name "${APP_NAME}" --resource-group "${RG}" --query "properties.configuration.ingress.fqdn" -o tsv)"
          if [ -z "${FQDN}" ]; then
            echo "::warning::${APP_NAME} has no public ingress; skipping smoke test."
            exit 0
          fi
          URL="https://${FQDN}/health"
          STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "${URL}")"
          if [ "${STATUS}" != "200" ]; then
            URL="https://${FQDN}/"
            STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "${URL}")"
          fi
          if [ "${STATUS}" != "200" ]; then
            echo "Smoke test failed for ${APP_NAME}. Last status: ${STATUS}" >&2
            exit 1
          fi
          echo "Smoke test passed for ${APP_NAME}"