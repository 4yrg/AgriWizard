name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify Go formatting
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l ./services)" ]; then
            echo "Go files are not formatted:"
            gofmt -l ./services
            exit 1
          fi

      - name: Run Go vet
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go vet "${module}/..."
          done

      - name: Run frontend lint
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run lint

      - name: Run Go tests
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go test "${module}/..."
          done

      - name: Frontend build verification
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run build

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

  build-and-push:
    name: Build and Push Backend Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        # Frontend service intentionally excluded from build/push matrix (prod backend-only deployment).
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:latest
          cache-from: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/cache/${{ matrix.service }}
          cache-to: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/cache/${{ matrix.service }},mode=max

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-push
    outputs:
      resource_group: ${{ steps.rg.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if infrastructure changes
        id: whatif
        run: |
          set -euo pipefail
          az deployment sub what-if \
            --name "whatif-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --result-format FullResourcePayloads \
            -o json > whatif.json
          CHANGES="$(jq '[.changes[] | select(.changeType != "NoChange")] | length' whatif.json)"
          echo "changes=${CHANGES}" >> "${GITHUB_OUTPUT}"
          if [ "${CHANGES}" -eq 0 ]; then
            echo "No infrastructure changes" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Deploy infrastructure
        if: steps.whatif.outputs.changes != '0'
        run: |
          set -euo pipefail
          az deployment sub create \
            --name "deploy-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            -o json > deployment.json
          echo "Infrastructure deployment completed." >> "${GITHUB_STEP_SUMMARY}"
          echo '```json' >> "${GITHUB_STEP_SUMMARY}"
          jq '.properties.outputs' deployment.json >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Resolve resource group output
        id: rg
        run: |
          set -euo pipefail
          RG_VALUE="$(az deployment sub show \
            --name "deploy-${GITHUB_RUN_ID}" \
            --query "properties.outputs.resourceGroupName.value" -o tsv 2>/dev/null || true)"
          if [ -z "${RG_VALUE}" ]; then
            RG_VALUE="${{ vars.AZURE_RESOURCE_GROUP }}"
          fi
          echo "value=${RG_VALUE}" >> "${GITHUB_OUTPUT}"

  deploy-app:
    name: Deploy Backend Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy-infra
    strategy:
      fail-fast: false
      matrix:
        # Frontend service intentionally excluded from app deploy matrix (prod backend-only deployment).
        include:
          - service: iam
            image_name: agriwizard-iam
          - service: hardware
            image_name: agriwizard-hardware
          - service: analytics
            image_name: agriwizard-analytics
          - service: weather
            image_name: agriwizard-weather
          - service: notification
            image_name: agriwizard-notification
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend image to ACA
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ matrix.service }}-prod
          resourceGroup: ${{ needs.deploy-infra.outputs.resource_group }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}

      - name: Wait for active revision
        run: |
          set -euo pipefail
          APP_NAME="${{ matrix.service }}-prod"
          RG="${{ needs.deploy-infra.outputs.resource_group }}"
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}"
          END_TS="$(( $(date +%s) + 300 ))"
          while [ "$(date +%s)" -lt "${END_TS}" ]; do
            ACTIVE_COUNT="$(az containerapp revision list \
              --name "${APP_NAME}" \
              --resource-group "${RG}" \
              --query "[?properties.active==\`true\` && properties.template.containers[0].image=='${IMAGE}'] | length(@)" \
              -o tsv)"
            if [ "${ACTIVE_COUNT}" = "1" ]; then
              echo "Revision with image ${IMAGE} is active."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for active revision of ${APP_NAME}." >&2
          exit 1

  smoke-test:
    name: Smoke Test Backend Apps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-app
    strategy:
      fail-fast: false
      matrix:
        # Frontend service intentionally excluded from smoke tests (backend-only ACA deployment).
        service: [iam, hardware, analytics, weather, notification]
    steps:
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test service endpoint
        run: |
          set -euo pipefail
          APP_NAME="${{ matrix.service }}-prod"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          FQDN="$(az containerapp show --name "${APP_NAME}" --resource-group "${RG}" --query "properties.configuration.ingress.fqdn" -o tsv)"
          if [ -z "${FQDN}" ]; then
            echo "::warning::${APP_NAME} has no public ingress; skipping smoke test by design."
            exit 0
          fi
          URL="https://${FQDN}/health"
          STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "${URL}")"
          if [ "${STATUS}" != "200" ]; then
            URL="https://${FQDN}/"
            STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "${URL}")"
          fi
          if [ "${STATUS}" != "200" ]; then
            echo "Smoke test failed for ${APP_NAME}. Last status: ${STATUS}" >&2
            exit 1
          fi
name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ vars.ACR_NAME }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify Go formatting
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l ./services)" ]; then
            echo "Go files are not formatted:"
            gofmt -l ./services
            exit 1
          fi

      - name: Run Go vet
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go vet "${module}/..."
          done

      - name: Run frontend lint
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Run Go tests
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go test "${module}/..."
          done

      - name: Frontend build verification
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run build

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
            container_port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
            container_port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
            container_port: "8088"
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
            container_port: "8089"
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
            container_port: "8091"
          - service: web
            image_name: agriwizard-web
            dockerfile: client/Dockerfile
            context: ./client
            container_port: "3000"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  push:
    name: Push Docker images to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
          - service: web
            image_name: agriwizard-web
            dockerfile: client/Dockerfile
            context: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate ACR login server value
        id: acr
        run: |
          set -euo pipefail
          ACR_SERVER="${ACR_LOGIN_SERVER:-}"

          # Fallback: derive login server from ACR name when provided.
          if [ -z "${ACR_SERVER}" ] && [ -n "${ACR_NAME:-}" ]; then
            ACR_SERVER="$(az acr show --name "${ACR_NAME}" --query loginServer -o tsv)"
          fi

          if [ -z "${ACR_SERVER}" ]; then
            echo "Either vars.ACR_LOGIN_SERVER (e.g., myregistry.azurecr.io) or vars.ACR_NAME must be set."
            exit 1
          fi

          echo "acr_server=${ACR_SERVER}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ACR login server: ${ACR_SERVER}"

      - name: Login to Azure Container Registry
        run: |
          set -euo pipefail
          az acr login --name "${{ steps.acr.outputs.acr_server%%.azurecr.io }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy_staging:
    name: Deploy to ACA (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # environment: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            app_name_var: ACA_APP_IAM_STAGING
            port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            app_name_var: ACA_APP_HARDWARE_STAGING
            port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            app_name_var: ACA_APP_ANALYTICS_STAGING
            port: "8088"
          - service: weather
            image_name: agriwizard-weather
            app_name_var: ACA_APP_WEATHER_STAGING
            port: "8089"
          - service: notification
            image_name: agriwizard-notification
            app_name_var: ACA_APP_NOTIFICATION_STAGING
            port: "8091"
          - service: web
            image_name: agriwizard-web
            app_name_var: ACA_APP_WEB_STAGING
            port: "3000"
    env:
      ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP_STAGING }}
      ACA_ENVIRONMENT: ${{ vars.ACA_ENVIRONMENT_STAGING }}
      CPU: ${{ vars.ACA_CPU || '0.5' }}
      MEMORY: ${{ vars.ACA_MEMORY || '1Gi' }}
      MIN_REPLICAS: ${{ vars.ACA_MIN_REPLICAS || '1' }}
      MAX_REPLICAS: ${{ vars.ACA_MAX_REPLICAS || '3' }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      OWM_BASE_URL: ${{ vars.OWM_BASE_URL }}
      LOCATION_LAT: ${{ vars.LOCATION_LAT }}
      LOCATION_LON: ${{ vars.LOCATION_LON }}
      LOCATION_CITY: ${{ vars.LOCATION_CITY }}
      USE_MOCK: ${{ vars.USE_MOCK }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve container app name
        id: app
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.app_name_var }}" in
            ACA_APP_IAM_STAGING) APP_NAME="${{ vars.ACA_APP_IAM_STAGING }}" ;;
            ACA_APP_HARDWARE_STAGING) APP_NAME="${{ vars.ACA_APP_HARDWARE_STAGING }}" ;;
            ACA_APP_ANALYTICS_STAGING) APP_NAME="${{ vars.ACA_APP_ANALYTICS_STAGING }}" ;;
            ACA_APP_WEATHER_STAGING) APP_NAME="${{ vars.ACA_APP_WEATHER_STAGING }}" ;;
            ACA_APP_NOTIFICATION_STAGING) APP_NAME="${{ vars.ACA_APP_NOTIFICATION_STAGING }}" ;;
            ACA_APP_WEB_STAGING) APP_NAME="${{ vars.ACA_APP_WEB_STAGING }}" ;;
            *) echo "Unsupported app name mapping: ${{ matrix.app_name_var }}" && exit 1 ;;
          esac
          if [ -z "${APP_NAME}" ]; then
            echo "GitHub variable for ${{ matrix.app_name_var }} is missing."
            exit 1
          fi
          echo "name=${APP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${ACR_LOGIN_SERVER:-}"
          if [ -z "${ACR_SERVER}" ] && [ -n "${ACR_NAME:-}" ]; then
            ACR_SERVER="$(az acr show --name "${ACR_NAME}" --query loginServer -o tsv)"
          fi
          if [ -z "${ACR_SERVER}" ]; then
            echo "Either vars.ACR_LOGIN_SERVER or vars.ACR_NAME must be set."
            exit 1
          fi
          echo "acr_server=${ACR_SERVER}" >> "${GITHUB_OUTPUT}"

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.ACA_RESOURCE_GROUP }}
          containerAppName: ${{ steps.app.outputs.name }}
          imageToDeploy: ${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:${{ github.sha }}

      - name: Apply secrets, env vars, and scaling policy
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.app.outputs.name }}"
          IMAGE="${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:${{ github.sha }}"

          # Secret values are written to ACA secret store, then referenced as env vars.
          az containerapp secret set \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --secrets \
              db-password="${{ secrets.DB_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              mqtt-password="${{ secrets.MQTT_PASSWORD }}" \
              owm-api-key="${{ secrets.OWM_API_KEY }}" \
              smtp-password="${{ secrets.SMTP_PASSWORD }}" \
              service-bus-connection="${{ secrets.SERVICE_BUS_CONNECTION }}"

          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --target-port "${{ matrix.port }}" \
            --ingress external \
            --cpu "${CPU}" \
            --memory "${MEMORY}" \
            --min-replicas "${MIN_REPLICAS}" \
            --max-replicas "${MAX_REPLICAS}" \
            --set-env-vars \
              PORT="${{ matrix.port }}" \
              DB_HOST="${DB_HOST}" \
              DB_PORT="${DB_PORT}" \
              DB_USER="${DB_USER}" \
              DB_NAME="${DB_NAME}" \
              DB_SSLMODE="${DB_SSLMODE}" \
              JWT_ISSUER="${JWT_ISSUER}" \
              OWM_BASE_URL="${OWM_BASE_URL}" \
              LOCATION_LAT="${LOCATION_LAT}" \
              LOCATION_LON="${LOCATION_LON}" \
              LOCATION_CITY="${LOCATION_CITY}" \
              USE_MOCK="${USE_MOCK}" \
              NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
              NEXT_PUBLIC_BASE_PATH="${NEXT_PUBLIC_BASE_PATH}" \
              DB_PASSWORD=secretref:db-password \
              JWT_SECRET=secretref:jwt-secret \
              MQTT_PASSWORD=secretref:mqtt-password \
              OWM_API_KEY=secretref:owm-api-key \
              SMTP_PASSWORD=secretref:smtp-password \
              SERVICE_BUS_CONNECTION=secretref:service-bus-connection

  deploy_production:
    name: Deploy to ACA (production)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy_staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            app_name_var: ACA_APP_IAM_PRODUCTION
            port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            app_name_var: ACA_APP_HARDWARE_PRODUCTION
            port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            app_name_var: ACA_APP_ANALYTICS_PRODUCTION
            port: "8088"
          - service: weather
            image_name: agriwizard-weather
            app_name_var: ACA_APP_WEATHER_PRODUCTION
            port: "8089"
          - service: notification
            image_name: agriwizard-notification
            app_name_var: ACA_APP_NOTIFICATION_PRODUCTION
            port: "8091"
          - service: web
            image_name: agriwizard-web
            app_name_var: ACA_APP_WEB_PRODUCTION
            port: "3000"
    env:
      ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP_PRODUCTION }}
      ACA_ENVIRONMENT: ${{ vars.ACA_ENVIRONMENT_PRODUCTION }}
      CPU: ${{ vars.ACA_CPU || '0.5' }}
      MEMORY: ${{ vars.ACA_MEMORY || '1Gi' }}
      MIN_REPLICAS: ${{ vars.ACA_MIN_REPLICAS || '2' }}
      MAX_REPLICAS: ${{ vars.ACA_MAX_REPLICAS || '5' }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      OWM_BASE_URL: ${{ vars.OWM_BASE_URL }}
      LOCATION_LAT: ${{ vars.LOCATION_LAT }}
      LOCATION_LON: ${{ vars.LOCATION_LON }}
      LOCATION_CITY: ${{ vars.LOCATION_CITY }}
      USE_MOCK: ${{ vars.USE_MOCK }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve container app name
        id: app
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.app_name_var }}" in
            ACA_APP_IAM_PRODUCTION) APP_NAME="${{ vars.ACA_APP_IAM_PRODUCTION }}" ;;
            ACA_APP_HARDWARE_PRODUCTION) APP_NAME="${{ vars.ACA_APP_HARDWARE_PRODUCTION }}" ;;
            ACA_APP_ANALYTICS_PRODUCTION) APP_NAME="${{ vars.ACA_APP_ANALYTICS_PRODUCTION }}" ;;
            ACA_APP_WEATHER_PRODUCTION) APP_NAME="${{ vars.ACA_APP_WEATHER_PRODUCTION }}" ;;
            ACA_APP_NOTIFICATION_PRODUCTION) APP_NAME="${{ vars.ACA_APP_NOTIFICATION_PRODUCTION }}" ;;
            ACA_APP_WEB_PRODUCTION) APP_NAME="${{ vars.ACA_APP_WEB_PRODUCTION }}" ;;
            *) echo "Unsupported app name mapping: ${{ matrix.app_name_var }}" && exit 1 ;;
          esac
          if [ -z "${APP_NAME}" ]; then
            echo "GitHub variable for ${{ matrix.app_name_var }} is missing."
            exit 1
          fi
          echo "name=${APP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${ACR_LOGIN_SERVER:-}"
          if [ -z "${ACR_SERVER}" ] && [ -n "${ACR_NAME:-}" ]; then
            ACR_SERVER="$(az acr show --name "${ACR_NAME}" --query loginServer -o tsv)"
          fi
          if [ -z "${ACR_SERVER}" ]; then
            echo "Either vars.ACR_LOGIN_SERVER or vars.ACR_NAME must be set."
            exit 1
          fi
          echo "acr_server=${ACR_SERVER}" >> "${GITHUB_OUTPUT}"

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.ACA_RESOURCE_GROUP }}
          containerAppName: ${{ steps.app.outputs.name }}
          imageToDeploy: ${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:${{ github.sha }}

      - name: Apply secrets, env vars, and scaling policy
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.app.outputs.name }}"
          IMAGE="${{ steps.acr.outputs.acr_server }}/${{ matrix.image_name }}:${{ github.sha }}"

          az containerapp secret set \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --secrets \
              db-password="${{ secrets.DB_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              mqtt-password="${{ secrets.MQTT_PASSWORD }}" \
              owm-api-key="${{ secrets.OWM_API_KEY }}" \
              smtp-password="${{ secrets.SMTP_PASSWORD }}" \
              service-bus-connection="${{ secrets.SERVICE_BUS_CONNECTION }}"

          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --target-port "${{ matrix.port }}" \
            --ingress external \
            --cpu "${CPU}" \
            --memory "${MEMORY}" \
            --min-replicas "${MIN_REPLICAS}" \
            --max-replicas "${MAX_REPLICAS}" \
            --set-env-vars \
              PORT="${{ matrix.port }}" \
              DB_HOST="${DB_HOST}" \
              DB_PORT="${DB_PORT}" \
              DB_USER="${DB_USER}" \
              DB_NAME="${DB_NAME}" \
              DB_SSLMODE="${DB_SSLMODE}" \
              JWT_ISSUER="${JWT_ISSUER}" \
              OWM_BASE_URL="${OWM_BASE_URL}" \
              LOCATION_LAT="${LOCATION_LAT}" \
              LOCATION_LON="${LOCATION_LON}" \
              LOCATION_CITY="${LOCATION_CITY}" \
              USE_MOCK="${USE_MOCK}" \
              NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
              NEXT_PUBLIC_BASE_PATH="${NEXT_PUBLIC_BASE_PATH}" \
              DB_PASSWORD=secretref:db-password \
              JWT_SECRET=secretref:jwt-secret \
              MQTT_PASSWORD=secretref:mqtt-password \
              OWM_API_KEY=secretref:owm-api-key \
              SMTP_PASSWORD=secretref:smtp-password \
              SERVICE_BUS_CONNECTION=secretref:service-bus-connection
