name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify Go formatting
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l ./services)" ]; then
            echo "Go files are not formatted:"
            gofmt -l ./services
            exit 1
          fi

      - name: Run Go vet
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go vet "${module}/..."
          done

      - name: Run frontend lint
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Run Go tests
        run: |
          set -euo pipefail
          for module in \
            ./services/iam-service \
            ./services/hardware-service \
            ./services/analytics-service \
            ./services/weather-service \
            ./services/notification-service; do
            go test "${module}/..."
          done

      - name: Frontend build verification
        run: |
          set -euo pipefail
          cd client
          npm ci
          npm run build

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
            container_port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
            container_port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
            container_port: "8088"
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
            container_port: "8089"
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
            container_port: "8091"
          - service: web
            image_name: agriwizard-web
            dockerfile: client/Dockerfile
            context: ./client
            container_port: "3000"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  push:
    name: Push Docker images to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build, deploy-bootstrap]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            dockerfile: services/iam-service/Dockerfile
            context: .
          - service: hardware
            image_name: agriwizard-hardware
            dockerfile: services/hardware-service/Dockerfile
            context: .
          - service: analytics
            image_name: agriwizard-analytics
            dockerfile: services/analytics-service/Dockerfile
            context: .
          - service: weather
            image_name: agriwizard-weather
            dockerfile: services/weather-service/Dockerfile
            context: .
          - service: notification
            image_name: agriwizard-notification
            dockerfile: services/notification-service/Dockerfile
            context: .
          - service: web
            image_name: agriwizard-web
            dockerfile: client/Dockerfile
            context: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate ACR login server value
        run: |
          set -euo pipefail
          if [ -z "${ACR_LOGIN_SERVER:-}" ]; then
            echo "vars.ACR_LOGIN_SERVER must be set (example: myregistry.azurecr.io)."
            exit 1
          fi

      - name: Login to Azure Container Registry
        run: |
          set -euo pipefail
          az acr login --name "${ACR_LOGIN_SERVER%%.azurecr.io}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
  deploy-bootstrap:
    name: Bootstrap Resources
    runs-on: ubuntu-latest
    needs: bootstrap-providers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      acr_name: ${{ steps.bootstrap.outputs.ACR_NAME }}
      acr_login_server: ${{ steps.bootstrap.outputs.ACR_LOGIN_SERVER }}
      service_bus_connection: ${{ steps.bootstrap.outputs.service_bus_connection }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy bootstrap resources
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=$(az deployment sub create \
            --name "agriwizard-bootstrap-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION || 'centralindia' }}" \
            --template-file infra/bootstrap-acr.bicep \
            --parameters namePrefix="agriwizard" acrName="${{ vars.ACR_NAME || 'agriwizardacr' }}" \
            -o json)
          
          ACR_NAME=$(echo $OUTPUT | jq -r '.properties.outputs.acrName.value')
          ACR_LOGIN_SERVER=$(echo $OUTPUT | jq -r '.properties.outputs.acrLoginServer.value')
          SB_CONNECTION=$(echo $OUTPUT | jq -r '.properties.outputs.serviceBusConnectionString.value')
          
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          
          # Securely mask and export the Service Bus connection string
          echo "::add-mask::$SB_CONNECTION"
          echo "service_bus_connection=$SB_CONNECTION" >> $GITHUB_OUTPUT
          
          echo "Bootstrap complete. Connection string masked and exported to outputs."

  bootstrap-providers:
    name: Register Resource Providers
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure Resource Providers
        shell: bash
        run: |
          set -euo pipefail
          PROVIDERS=(
            "Microsoft.ServiceBus"
            "Microsoft.App"
            "Microsoft.ContainerRegistry"
            "Microsoft.OperationalInsights"
            "Microsoft.KeyVault"
            "Microsoft.ManagedIdentity"
            "Microsoft.DBforPostgreSQL"
          )
          
          echo "=== Initiating Proactive Provider Registration ==="
          for provider in "${PROVIDERS[@]}"; do
            echo "Registering $provider..."
            az provider register --namespace "$provider" --wait
          done
          echo "All providers registered and validated."

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [push, deploy-bootstrap]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment variables
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}" >> $GITHUB_ENV
          echo "OWM_API_KEY=${{ secrets.OWM_API_KEY }}" >> $GITHUB_ENV
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> $GITHUB_ENV
          echo "SERVICE_BUS_CONNECTION=${{ secrets.SERVICE_BUS_CONNECTION }}" >> $GITHUB_ENV

      - name: Show current CLI versions
        run: |
          echo "=== Current CLI Versions ==="
          az version
          echo ""
          az bicep version || echo "Bicep not installed"

      - name: Upgrade Azure CLI
        run: |
          echo "=== Upgrading Azure CLI ==="
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version

      - name: Install/Upgrade Bicep CLI
        run: |
          echo "=== Upgrading Bicep CLI ==="
          az bicep upgrade
          az bicep version

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

      - name: Compile Bicep to JSON with parameters
        run: |
          echo "=== Compiling Bicep to JSON with parameters ==="
          az bicep build --file infra/main.bicep --outfile infra/template.json
          echo "Template compiled to infra/template.json"

      - name: Deploy infrastructure
        run: |
          set -euo pipefail
          echo "=== Deploying Infrastructure ==="
          az deployment sub create \
            --name "agriwizard-prod-${GITHUB_RUN_ID}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file infra/template.json \
            --parameters @infra/parameters.json \
              dbPassword="${{ secrets.DB_PASSWORD }}" \
              jwtSecret="${{ secrets.JWT_SECRET }}" \
              mqttPassword="${{ secrets.MQTT_PASSWORD }}" \
              owmApiKey="${{ secrets.OWM_API_KEY }}" \
              smtpPassword="${{ secrets.SMTP_PASSWORD }}" \
              serviceBusConnection="${{ needs.deploy-bootstrap.outputs.service_bus_connection || secrets.SERVICE_BUS_CONNECTION }}" \
            -o json > deployment.json
          echo "Infrastructure deployment completed" >> $GITHUB_STEP_SUMMARY
          jq '.properties.outputs' deployment.json >> $GITHUB_STEP_SUMMARY

  deploy_staging:
    name: Deploy to ACA (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [push, deploy-infra]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # environment: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            app_name_var: ACA_APP_IAM_STAGING
            port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            app_name_var: ACA_APP_HARDWARE_STAGING
            port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            app_name_var: ACA_APP_ANALYTICS_STAGING
            port: "8088"
          - service: weather
            image_name: agriwizard-weather
            app_name_var: ACA_APP_WEATHER_STAGING
            port: "8089"
          - service: notification
            image_name: agriwizard-notification
            app_name_var: ACA_APP_NOTIFICATION_STAGING
            port: "8091"
          - service: web
            image_name: agriwizard-web
            app_name_var: ACA_APP_WEB_STAGING
            port: "3000"
          - service: kong
            image_name: kong
            app_name_var: ACA_APP_KONG_STAGING
            port: "8000"
            is_official: true
    env:
      ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP_STAGING }}
      ACA_ENVIRONMENT: ${{ vars.ACA_ENVIRONMENT_STAGING }}
      CPU: ${{ vars.ACA_CPU || '0.5' }}
      MEMORY: ${{ vars.ACA_MEMORY || '1Gi' }}
      MIN_REPLICAS: ${{ vars.ACA_MIN_REPLICAS || '1' }}
      MAX_REPLICAS: ${{ vars.ACA_MAX_REPLICAS || '3' }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      OWM_BASE_URL: ${{ vars.OWM_BASE_URL }}
      LOCATION_LAT: ${{ vars.LOCATION_LAT }}
      LOCATION_LON: ${{ vars.LOCATION_LON }}
      LOCATION_CITY: ${{ vars.LOCATION_CITY }}
      USE_MOCK: ${{ vars.USE_MOCK }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve container app name
        id: app
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.app_name_var }}" in
            ACA_APP_IAM_STAGING) APP_NAME="${{ vars.ACA_APP_IAM_STAGING }}" ;;
            ACA_APP_HARDWARE_STAGING) APP_NAME="${{ vars.ACA_APP_HARDWARE_STAGING }}" ;;
            ACA_APP_ANALYTICS_STAGING) APP_NAME="${{ vars.ACA_APP_ANALYTICS_STAGING }}" ;;
            ACA_APP_WEATHER_STAGING) APP_NAME="${{ vars.ACA_APP_WEATHER_STAGING }}" ;;
            ACA_APP_NOTIFICATION_STAGING) APP_NAME="${{ vars.ACA_APP_NOTIFICATION_STAGING }}" ;;
            ACA_APP_WEB_STAGING) APP_NAME="${{ vars.ACA_APP_WEB_STAGING }}" ;;
            *) echo "Unsupported app name mapping: ${{ matrix.app_name_var }}" && exit 1 ;;
          esac
          if [ -z "${APP_NAME}" ]; then
            echo "GitHub variable for ${{ matrix.app_name_var }} is missing."
            exit 1
          fi
          echo "name=${APP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.ACA_RESOURCE_GROUP }}
          containerAppName: ${{ steps.app.outputs.name }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}

      - name: Apply secrets, env vars, and scaling policy
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.app.outputs.name }}"
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ github.sha }}"

          # Secret values are written to ACA secret store, then referenced as env vars.
          az containerapp secret set \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --secrets \
              db-password="${{ secrets.DB_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              mqtt-password="${{ secrets.MQTT_PASSWORD }}" \
              owm-api-key="${{ secrets.OWM_API_KEY }}" \
              smtp-password="${{ secrets.SMTP_PASSWORD }}" \
              service-bus-connection="${{ secrets.SERVICE_BUS_CONNECTION }}"

          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --target-port "${{ matrix.port }}" \
            --ingress external \
            --cpu "${CPU}" \
            --memory "${MEMORY}" \
            --min-replicas "${MIN_REPLICAS}" \
            --max-replicas "${MAX_REPLICAS}" \
            --set-env-vars \
              PORT="${{ matrix.port }}" \
              DB_HOST="${DB_HOST}" \
              DB_PORT="${DB_PORT}" \
              DB_USER="${DB_USER}" \
              DB_NAME="${DB_NAME}" \
              DB_SSLMODE="${DB_SSLMODE}" \
              JWT_ISSUER="${JWT_ISSUER}" \
              OWM_BASE_URL="${OWM_BASE_URL}" \
              LOCATION_LAT="${LOCATION_LAT}" \
              LOCATION_LON="${LOCATION_LON}" \
              LOCATION_CITY="${LOCATION_CITY}" \
              USE_MOCK="${USE_MOCK}" \
              NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
              NEXT_PUBLIC_BASE_PATH="${NEXT_PUBLIC_BASE_PATH}" \
              DB_PASSWORD=secretref:db-password \
              JWT_SECRET=secretref:jwt-secret \
              MQTT_PASSWORD=secretref:mqtt-password \
              OWM_API_KEY=secretref:owm-api-key \
              SMTP_PASSWORD=secretref:smtp-password \
              SERVICE_BUS_CONNECTION=secretref:service-bus-connection

  deploy_production:
    name: Deploy to ACA (production)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy_staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: iam
            image_name: agriwizard-iam
            app_name_var: ACA_APP_IAM_PRODUCTION
            port: "8086"
          - service: hardware
            image_name: agriwizard-hardware
            app_name_var: ACA_APP_HARDWARE_PRODUCTION
            port: "8087"
          - service: analytics
            image_name: agriwizard-analytics
            app_name_var: ACA_APP_ANALYTICS_PRODUCTION
            port: "8088"
          - service: weather
            image_name: agriwizard-weather
            app_name_var: ACA_APP_WEATHER_PRODUCTION
            port: "8089"
          - service: notification
            image_name: agriwizard-notification
            app_name_var: ACA_APP_NOTIFICATION_PRODUCTION
            port: "8091"
          - service: web
            image_name: agriwizard-web
            app_name_var: ACA_APP_WEB_PRODUCTION
            port: "3000"
          - service: kong
            image_name: kong
            app_name_var: ACA_APP_KONG_PRODUCTION
            port: "8000"
            is_official: true
    env:
      ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP_PRODUCTION }}
      ACA_ENVIRONMENT: ${{ vars.ACA_ENVIRONMENT_PRODUCTION }}
      CPU: ${{ vars.ACA_CPU || '0.5' }}
      MEMORY: ${{ vars.ACA_MEMORY || '1Gi' }}
      MIN_REPLICAS: ${{ vars.ACA_MIN_REPLICAS || '2' }}
      MAX_REPLICAS: ${{ vars.ACA_MAX_REPLICAS || '5' }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      OWM_BASE_URL: ${{ vars.OWM_BASE_URL }}
      LOCATION_LAT: ${{ vars.LOCATION_LAT }}
      LOCATION_LON: ${{ vars.LOCATION_LON }}
      LOCATION_CITY: ${{ vars.LOCATION_CITY }}
      USE_MOCK: ${{ vars.USE_MOCK }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve container app name
        id: app
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.app_name_var }}" in
            ACA_APP_IAM_PRODUCTION) APP_NAME="${{ vars.ACA_APP_IAM_PRODUCTION }}" ;;
            ACA_APP_HARDWARE_PRODUCTION) APP_NAME="${{ vars.ACA_APP_HARDWARE_PRODUCTION }}" ;;
            ACA_APP_ANALYTICS_PRODUCTION) APP_NAME="${{ vars.ACA_APP_ANALYTICS_PRODUCTION }}" ;;
            ACA_APP_WEATHER_PRODUCTION) APP_NAME="${{ vars.ACA_APP_WEATHER_PRODUCTION }}" ;;
            ACA_APP_NOTIFICATION_PRODUCTION) APP_NAME="${{ vars.ACA_APP_NOTIFICATION_PRODUCTION }}" ;;
            ACA_APP_WEB_PRODUCTION) APP_NAME="${{ vars.ACA_APP_WEB_PRODUCTION }}" ;;
            ACA_APP_KONG_PRODUCTION) APP_NAME="${{ vars.ACA_APP_KONG_PRODUCTION }}" ;;
            *) echo "Unsupported app name mapping: ${{ matrix.app_name_var }}" && exit 1 ;;
          esac
          if [ -z "${APP_NAME}" ]; then
            echo "GitHub variable for ${{ matrix.app_name_var }} is missing."
            exit 1
          fi
          echo "name=${APP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.ACA_RESOURCE_GROUP }}
          containerAppName: ${{ steps.app.outputs.name }}
          imageToDeploy: ${{ matrix.image_name == 'kong' && 'kong:3.4' || format('{0}/{1}:{2}', env.ACR_LOGIN_SERVER, matrix.image_name, github.sha) }}

      - name: Apply secrets, env vars, and scaling policy
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.app.outputs.name }}"
          IMAGE="${{ matrix.image_name == 'kong' && 'kong:3.4' || format('{0}/{1}:{2}', env.ACR_LOGIN_SERVER, matrix.image_name, github.sha) }}"

          az containerapp secret set \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --secrets \
              db-password="${{ secrets.DB_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              mqtt-password="${{ secrets.MQTT_PASSWORD }}" \
              owm-api-key="${{ secrets.OWM_API_KEY }}" \
              smtp-password="${{ secrets.SMTP_PASSWORD }}" \
              service-bus-connection="${{ secrets.SERVICE_BUS_CONNECTION }}"

          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --target-port "${{ matrix.port }}" \
            --ingress external \
            --cpu "${CPU}" \
            --memory "${MEMORY}" \
            --min-replicas "${MIN_REPLICAS}" \
            --max-replicas "${MAX_REPLICAS}" \
            --set-env-vars \
              PORT="${{ matrix.port }}" \
              DB_HOST="${DB_HOST}" \
              DB_PORT="${DB_PORT}" \
              DB_USER="${DB_USER}" \
              DB_NAME="${DB_NAME}" \
              DB_SSLMODE="${DB_SSLMODE}" \
              JWT_ISSUER="${JWT_ISSUER}" \
              OWM_BASE_URL="${OWM_BASE_URL}" \
              LOCATION_LAT="${LOCATION_LAT}" \
              LOCATION_LON="${LOCATION_LON}" \
              LOCATION_CITY="${LOCATION_CITY}" \
              USE_MOCK="${USE_MOCK}" \
              NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
