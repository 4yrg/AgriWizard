name: "App: Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "apps/**"
      - "client/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all services"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-agriwizard
  CONTAINER_APP_ENV: agriwizard-aca-env

jobs:
  # ============================================================================
  # Job 1: Ensure Infrastructure (ACR exists)
  # ============================================================================
  ensure-infra:
    name: "Ensure Infrastructure"
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.get-acr.outputs.acr_name }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check ACR exists
        id: get-acr
        run: |
          ACR_NAME=$(az acr list --resource-group ${{ env.RESOURCE_GROUP }} --query "[0].name" -o tsv)
          if [ -z "$ACR_NAME" ]; then
            echo "ERROR: No Azure Container Registry found in resource group '${{ env.RESOURCE_GROUP }}'"
            echo "Please run the 'infra' workflow first to create the infrastructure."
            exit 1
          fi
          echo "ACR found: $ACR_NAME"
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name ${{ steps.get-acr.outputs.acr_name }}

# ============================================================================
  # Job 2: Detect changes to optimize build
  # ============================================================================
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    needs: ensure-infra
    outputs:
      iam: ${{ steps.filter.outputs.iam }}
      hardware: ${{ steps.filter.outputs.hardware }}
      analytics: ${{ steps.filter.outputs.analytics }}
      weather: ${{ steps.filter.outputs.weather }}
      notification: ${{ steps.filter.outputs.notification }}
      web: ${{ steps.filter.outputs.web }}
      any_changed: ${{ steps.filter.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iam:
              - 'services/iam-service/**'
            hardware:
              - 'services/hardware-service/**'
            analytics:
              - 'services/analytics-service/**'
            weather:
              - 'services/weather-service/**'
            notification:
              - 'services/notification-service/**'
            web:
              - 'client/**'
            any_changed:
              - 'services/**'
              - 'client/**'

  # ============================================================================
  # Job 3: Test Backend (Go)
  # ============================================================================
  test-backend:
    name: "Test Backend"
    needs: [detect-changes, ensure-infra]
    if: needs.detect-changes.outputs.any_changed == 'true' || github.event.inputs.deploy_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Run Go tests
        run: |
          go test ./services/... -v

  # ============================================================================
  # Job 4: Test Frontend (Next.js)
  # ============================================================================
  test-frontend:
    name: "Test Frontend"
    needs: [detect-changes, ensure-infra]
    if: needs.detect-changes.outputs.web == 'true' || github.event.inputs.deploy_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        working-directory: client
        run: npm ci
      
      - name: Lint & Build
        working-directory: client
        run: |
          npm run lint
          npm run build

  # ============================================================================
  # Job 5: Build & Push Images
  # ============================================================================
  build-images:
    name: "Build & Push"
    needs: [test-backend, test-frontend, detect-changes, ensure-infra]
    if: always() && (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Set image tags
        id: vars
        run: |
          TAG=$(date +%Y%m%d-%H%M)
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Name from setup
        run: |
          ACR_NAME="${{ needs.ensure-infra.outputs.acr_name }}"
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # Build individual services if changed
      - name: Build IAM
        if: needs.detect-changes.outputs.iam == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-iam:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-iam:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-iam:latest \
                       -f services/iam-service/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-iam --all-tags

      - name: Build Hardware
        if: needs.detect-changes.outputs.hardware == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-hardware:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-hardware:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-hardware:latest \
                       -f services/hardware-service/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-hardware --all-tags

      - name: Build Analytics
        if: needs.detect-changes.outputs.analytics == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-analytics:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-analytics:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-analytics:latest \
                       -f services/analytics-service/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-analytics --all-tags

      - name: Build Weather
        if: needs.detect-changes.outputs.weather == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-weather:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-weather:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-weather:latest \
                       -f services/weather-service/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-weather --all-tags

      - name: Build Notification
        if: needs.detect-changes.outputs.notification == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-notification:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-notification:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-notification:latest \
                       -f services/notification-service/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-notification --all-tags

      - name: Build Web
        if: needs.detect-changes.outputs.web == 'true' || github.event.inputs.deploy_all == 'true'
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-web:${{ steps.vars.outputs.tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-web:${{ steps.vars.outputs.sha_tag }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-web:latest \
                       -f client/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-web --all-tags


  # ============================================================================
  # Job 6: Deploy to Azure Container Apps
  # ============================================================================
  deploy-services:
    name: "Deploy Services"
    needs: [build-images, detect-changes, ensure-infra]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ACR Name
        run: |
          ACR_NAME="${{ needs.ensure-infra.outputs.acr_name }}"
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Deploy Services
        run: |
          SERVICES=()
          [[ "${{ needs.detect-changes.outputs.iam }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("iam")
          [[ "${{ needs.detect-changes.outputs.hardware }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("hardware")
          [[ "${{ needs.detect-changes.outputs.analytics }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("analytics")
          [[ "${{ needs.detect-changes.outputs.weather }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("weather")
          [[ "${{ needs.detect-changes.outputs.notification }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("notification")
          [[ "${{ needs.detect-changes.outputs.web }}" == "true" || "${{ github.event.inputs.deploy_all }}" == "true" ]] && SERVICES+=("web")

          for svc in "${SERVICES[@]}"; do
            echo "Deploying $svc..."
            az containerapp update \
              --name "agriwizard-$svc" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image "${{ env.ACR_NAME }}.azurecr.io/agriwizard-$svc:${{ needs.build-images.outputs.image_tag }}" \
              --query "properties.provisioningState"
          done

  # ============================================================================
  # Job 7: Smoke Tests
  # ============================================================================
  smoke-tests:
    name: "Smoke Tests"
    needs: deploy-services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Run Health Checks
        run: |
          # Get APIM Gateway URL
          APIM_URL=$(az apim show --name agriwizard-apim --resource-group ${{ env.RESOURCE_GROUP }} --query "gatewayUrl" -o tsv)
          # APIM gatewayUrl already includes https://
          echo "APIM Gateway: $APIM_URL"
          
          # Wait for propagation
          sleep 30
          
          # Check health endpoints
          endpoints=("/api/v1/iam/health" "/api/v1/hardware/health")
          for ep in "${endpoints[@]}"; do
            echo "Testing $ep..."
            curl -f "$APIM_URL$ep" || exit 1
          done

  # ============================================================================
  # Job 8: Rollback (on failure)
  # ============================================================================
  rollback-on-failure:
    name: "Rollback"
    needs: [deploy-services, smoke-tests]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Revert to previous revision
        run: |
          APPS=("agriwizard-iam" "agriwizard-hardware" "agriwizard-analytics" "agriwizard-weather" "agriwizard-notification" "agriwizard-web")
          for app in "${APPS[@]}"; do
            echo "Checking $app for rollback..."
            PREV_REV=$(az containerapp revision list --name $app --resource-group ${{ env.RESOURCE_GROUP }} --query "sort_by([?properties.active==`false`], &properties.createdTime)[-1].name" -o tsv)
            if [ -n "$PREV_REV" ]; then
              echo "Rolling back $app to $PREV_REV"
              az containerapp ingress traffic set --name $app --resource-group ${{ env.RESOURCE_GROUP }} --revision-weight $PREV_REV=100
            fi
          done
