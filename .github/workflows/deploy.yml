name: Build and Deploy to Azure

on:
  push:
    branches:
      - development
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - production

env:
  REGISTRY: agriwizard.azurecr.io
  RESOURCE_GROUP: agriwizard-rg

jobs:
  # ============================================================================
  # Environment Selection
  # ============================================================================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tag: ${{ steps.env.outputs.tag }}
      prefix: ${{ steps.env.outputs.prefix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "tag=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "prefix=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "prefix=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prefix=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "prefix=dev" >> $GITHUB_OUTPUT
          fi

          echo "========================================"
          echo "Building for: ${{ steps.env.outputs.environment }}"
          echo "Image tag: ${{ steps.env.outputs.tag }}"
          echo "Service prefix: ${{ steps.env.outputs.prefix }}"
          echo "========================================"

  # ============================================================================
  # Build and Push Docker Images
  # ============================================================================
  build-push:
    name: Build & Push Images
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      matrix:
        service: [iam-service, hardware-service, analytics-service, weather-service, notification-service]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/agriwizard-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ needs.setup.outputs.tag }},enable=${{ needs.setup.outputs.tag != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image pushed summary
        run: |
          echo "✓ ${{ matrix.service }} built and pushed: ${{ steps.meta.outputs.tags }}"

  # ============================================================================
  # Generate Deployment Commands
  # ============================================================================
  deployment-commands:
    name: Generate Deployment Commands
    needs: [setup, build-push]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      commands: ${{ steps.generate.outputs.commands }}
    steps:
      - name: Generate deployment commands
        id: generate
        run: |
          PREFIX="${{ needs.setup.outputs.prefix }}"
          TAG="${{ needs.setup.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          RG="${{ env.RESOURCE_GROUP }}"

          cat << EOF > deployment-commands.sh
          #!/bin/bash
          # Deployment commands for ${{ needs.setup.outputs.environment }} environment
          # Image tag: $TAG
          # Prefix: $PREFIX

          echo "========================================="
          echo "Deploying to ${{ needs.setup.outputs.environment }} environment"
          echo "Image tag: $TAG"
          echo "========================================="

          # Login to Azure
          echo "Logging into Azure..."
          az login

          # Set subscription
          az account set --subscription 911cf5d3-ab4a-4897-9e23-244536f28127

          # Update Container Apps
          echo "Deploying IAM Service..."
          az containerapp update \\
            --name ${PREFIX}-iam-service \\
            --resource-group ${RG} \\
            --image ${REGISTRY}/agriwizard-iam-service:${TAG}

          echo "Deploying Hardware Service..."
          az containerapp update \\
            --name ${PREFIX}-hardware-service \\
            --resource-group ${RG} \\
            --image ${REGISTRY}/agriwizard-hardware-service:${TAG}

          echo "Deploying Analytics Service..."
          az containerapp update \\
            --name ${PREFIX}-analytics-service \\
            --resource-group ${RG} \\
            --image ${REGISTRY}/agriwizard-analytics-service:${TAG}

          echo "Deploying Weather Service..."
          az containerapp update \\
            --name ${PREFIX}-weather-service \\
            --resource-group ${RG} \\
            --image ${REGISTRY}/agriwizard-weather-service:${TAG}

          echo "Deploying Notification Service..."
          az containerapp update \\
            --name ${PREFIX}-notification-service \\
            --resource-group ${RG} \\
            --image ${REGISTRY}/agriwizard-notification-service:${TAG}

          echo "========================================="
          echo "Deployment completed!"
          echo "========================================="
          EOF

          # Output as JSON
          echo "commands<<EOF" >> $GITHUB_OUTPUT
          cat deployment-commands.sh >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ============================================================================
  # Notify Completion
  # ============================================================================
  notify:
    name: Deployment Ready
    needs: [setup, build-push, deployment-commands]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "========================================="
          echo "✅ Build completed successfully!"
          echo "========================================="
          echo ""
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Image tag: ${{ needs.setup.outputs.tag }}"
          echo ""
          echo "Docker images pushed to ACR:"
          echo "  - agriwizard.azurecr.io/agriwizard-iam-service:${{ needs.setup.outputs.tag }}"
          echo "  - agriwizard.azurecr.io/agriwizard-hardware-service:${{ needs.setup.outputs.tag }}"
          echo "  - agriwizard.azurecr.io/agriwizard-analytics-service:${{ needs.setup.outputs.tag }}"
          echo "  - agriwizard.azurecr.io/agriwizard-weather-service:${{ needs.setup.outputs.tag }}"
          echo "  - agriwizard.azurecr.io/agriwizard-notification-service:${{ needs.setup.outputs.tag }}"
          echo ""
          echo "========================================="
          echo "📋 TO DEPLOY TO AZURE CONTAINER APPS"
          echo "========================================="
          echo ""
          echo "Run these commands locally:"
          echo ""
          echo '```bash'
          echo "# Login to Azure"
          echo "az login"
          echo ""
          echo "# Deploy services"
          echo 'az containerapp update --name ${{ needs.setup.outputs.prefix }}-iam-service --resource-group agriwizard-rg --image agriwizard.azurecr.io/agriwizard-iam-service:${{ needs.setup.outputs.tag }}'
          echo 'az containerapp update --name ${{ needs.setup.outputs.prefix }}-hardware-service --resource-group agriwizard-rg --image agriwizard.azurecr.io/agriwizard-hardware-service:${{ needs.setup.outputs.tag }}'
          echo 'az containerapp update --name ${{ needs.setup.outputs.prefix }}-analytics-service --resource-group agriwizard-rg --image agriwizard.azurecr.io/agriwizard-analytics-service:${{ needs.setup.outputs.tag }}'
          echo 'az containerapp update --name ${{ needs.setup.outputs.prefix }}-weather-service --resource-group agriwizard-rg --image agriwizard.azurecr.io/agriwizard-weather-service:${{ needs.setup.outputs.tag }}'
          echo 'az containerapp update --name ${{ needs.setup.outputs.prefix }}-notification-service --resource-group agriwizard-rg --image agriwizard.azurecr.io/agriwizard-notification-service:${{ needs.setup.outputs.tag }}'
          echo '```'
          echo ""
          echo "Or save the generated script:"
          echo "Save the content from deployment-commands.sh and run it locally"