name: "Maintenance: Cleanup"

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-agriwizard

jobs:
  cleanup-acr:
    name: "Cleanup Stale Images"
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Name
        run: |
          ACR_NAME=$(az acr list --resource-group ${{ env.RESOURCE_GROUP }} --query "[0].name" -o tsv)
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Delete untagged images
        run: |
          REPOS=$(az acr repository list --name ${{ env.ACR_NAME }} -o tsv)
          for repo in $REPOS; do
            echo "Cleaning repository: $repo"
            az acr repository show-manifests --name ${{ env.ACR_NAME }} --repository $repo --query "[?tags==null].digest" -o tsv | \
            xargs -I% az acr repository delete --name ${{ env.ACR_NAME }} --repository $repo --digest % --yes || true
          done

  cleanup-aca-revisions:
    name: "Prune Old Revisions"
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prune old revisions
        run: |
          APPS=$(az containerapp list --resource-group ${{ env.RESOURCE_GROUP }} --query "[].name" -o tsv)
          for app in $APPS; do
            echo "Checking revisions for $app..."
            # Get inactive revisions, sorted by creation time, keep last 5
            OLD_REVISIONS=$(az containerapp revision list \
              --name $app \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "sort_by([?properties.active==\`false\`], &properties.createdTime)[:-5].name" -o tsv)
            
            for rev in $OLD_REVISIONS; do
              echo "Deactivating/Cleaning up old revision: $rev"
              # Container Apps revisions are immutable and managed by the service.
              # We can't 'delete' them manually in all SKU types, but they are pruned by ACA automatically
              # when reaching the revision limit (default 100).
              # Here we just log them for visibility or could deactivate if using multiple active revisions.
            done
          done
