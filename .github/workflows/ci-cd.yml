name: AgriWizard CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: agriwizardacr
  RESOURCE_GROUP: agriwizard-dev-rg
  ENVIRONMENT: dev

jobs:
  # ===========================================================================
  # Lint & Unit Tests
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: .

      - name: Test IAM Service
        working-directory: services/iam-service
        run: |
          go mod download
          go test -v -race ./...

      - name: Test Hardware Service
        working-directory: services/hardware-service
        run: |
          go mod download
          go test -v -race ./...

      - name: Test Analytics Service
        working-directory: services/analytics-service
        run: |
          go mod download
          go test -v -race ./...

      - name: Test Weather Service
        working-directory: services/weather-service
        run: |
          go mod download
          go test -v -race ./...

      - name: Test Notification Service
        working-directory: services/notification-service
        run: |
          go mod download
          go test -v -race ./...

  # ===========================================================================
  # Build & Push to Azure Container Registry
  # Runs only on push to main (not PRs)
  # ===========================================================================
  build-and-push:
    name: Build & Push Images
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push IAM Service
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-iam-service:${{ steps.tag.outputs.tag }} \
            --image agriwizard-iam-service:latest \
            --file services/iam-service/Dockerfile \
            .

      - name: Build & push Hardware Service
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-hardware-service:${{ steps.tag.outputs.tag }} \
            --image agriwizard-hardware-service:latest \
            --file services/hardware-service/Dockerfile \
            .

      - name: Build & push Analytics Service
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-analytics-service:${{ steps.tag.outputs.tag }} \
            --image agriwizard-analytics-service:latest \
            --file services/analytics-service/Dockerfile \
            .

      - name: Build & push Weather Service
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-weather-service:${{ steps.tag.outputs.tag }} \
            --image agriwizard-weather-service:latest \
            --file services/weather-service/Dockerfile \
            .

      - name: Build & push Notification Service
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-notification-service:${{ steps.tag.outputs.tag }} \
            --image agriwizard-notification-service:latest \
            --file services/notification-service/Dockerfile \
            .

      - name: Build & push Frontend
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image agriwizard-frontend:${{ steps.tag.outputs.tag }} \
            --image agriwizard-frontend:latest \
            --file client/Dockerfile \
            .

  # ===========================================================================
  # Deploy to Azure Container Apps
  # ===========================================================================
  deploy:
    name: Deploy to Azure
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy IAM Service
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-iam \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-iam-service:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Hardware Service
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-hardware \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-hardware-service:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Analytics Service
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-analytics \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-analytics-service:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Weather Service
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-weather \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-weather-service:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Notification Service
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-notification \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-notification-service:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name agriwizard-${{ env.ENVIRONMENT }}-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agriwizard-frontend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Health Check - Kong Gateway
        run: |
          KONG_URL=$(az containerapp show \
            --name agriwizard-${{ env.ENVIRONMENT }}-kong \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionFqdn" -o tsv)
          sleep 30
          curl -f "https://${KONG_URL}/health" || echo "Warning: health check failed (services may still be starting)"

  # ===========================================================================
  # Rollback on Deploy Failure
  # ===========================================================================
  rollback:
    name: Rollback
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Rollback all Container Apps to previous revision
        run: |
          for app in iam hardware analytics weather notification frontend; do
            APP_NAME="agriwizard-${{ env.ENVIRONMENT }}-${app}"
            echo "Rolling back ${APP_NAME}..."
            PREV_REVISION=$(az containerapp revision list \
              --name $APP_NAME \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query 'sort_by([?properties.active==`false`], &properties.createdTime)[-1].name' \
              -o tsv)
            if [ -n "$PREV_REVISION" ]; then
              az containerapp ingress traffic set \
                --name $APP_NAME \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision-weight "${PREV_REVISION}=100"
              echo "Rolled back ${APP_NAME} to ${PREV_REVISION}"
            else
              echo "No previous revision found for ${APP_NAME}"
            fi
          done