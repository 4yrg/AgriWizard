name: "Release: Production Release"

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: agriwizardacr
  RESOURCE_GROUP: rg-agriwizard

jobs:
  release:
    name: "Immutable Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Tag and Push Release Images
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          SERVICES=("iam" "hardware" "analytics" "weather" "notification" "web")
          
          az acr login --name ${{ env.ACR_NAME }}
          
          for svc in "${SERVICES[@]}"; do
            echo "Tagging agriwizard-$svc:latest as $VERSION..."
            # We assume the 'latest' image in ACR is the one we want to tag for release (or we could build from scratch)
            # To be safe and immutable, we should build from the tag
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/agriwizard-$svc:$VERSION \
                         -f $([[ "$svc" == "web" ]] && echo "client/Dockerfile" || echo "services/$svc-service/Dockerfile") .
            docker push ${{ env.ACR_NAME }}.azurecr.io/agriwizard-$svc:$VERSION
          done

      - name: Generate Release Summary
        run: |
          echo "## AgriWizard Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_STEP_SUMMARY
          echo "Released at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to ACR: ${{ env.ACR_NAME }}.azurecr.io" >> $GITHUB_STEP_SUMMARY
