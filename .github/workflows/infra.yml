name: "Infrastructure: Deploy Bicep"

on:
  workflow_dispatch:
    inputs:
      what_if_only:
        description: "Run what-if preview only (do not deploy)"
        type: boolean
        default: false
      confirm_deploy:
        description: "Type DEPLOY to confirm production deployment"
        type: string
        required: false
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"

concurrency:
  group: infra-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: centralindia
  RESOURCE_GROUP: agriwizard-prod-rg
  DEPLOYMENT_NAME: agriwizard-infra-${{ github.run_number }}

jobs:
  # ============================================================================
  # Job 1: Validate & What-If Preview
  # ============================================================================
  validate:
    name: "Validate & What-If"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          az bicep build --file infra/main.bicep
          az deployment group validate \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --parameters infra/parameters/production.bicepparam \
            --name "${{ env.DEPLOYMENT_NAME }}-validate"

      - name: Run What-If
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          az deployment group what-if \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --parameters infra/parameters/production.bicepparam \
            --name "${{ env.DEPLOYMENT_NAME }}"

  # ============================================================================
  # Job 2: Deploy Infrastructure
  # ============================================================================
  deploy:
    name: "Deploy Infrastructure"
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.what_if_only != 'true' && github.event.inputs.confirm_deploy == 'DEPLOY')
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --parameters infra/parameters/production.bicepparam \
            --name "${{ env.DEPLOYMENT_NAME }}" \
            --mode Incremental

      - name: Show Deployment Outputs
        run: |
          az deployment group show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.DEPLOYMENT_NAME }}" \
            --query "properties.outputs" \
            --output table
