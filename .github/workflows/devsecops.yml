name: CI/CD - AgriWizard DevSecOps Pipeline

on:
  push:
    branches: ["main,development"]
  pull_request:
    branches: ["main", "development"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: agriwizard.azurecr.io
  GO_VERSION: "1.26.1"

jobs:
  lint-and-fmt:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_path:
          - services/iam-service
          - services/hardware-service
          - services/analytics-service
          - services/weather-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: ${{ matrix.service_path }}
          args: --timeout=5m --config=../../.golangci.yml

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif

  sonarcloud:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-fmt, security-scan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service:
          [iam-service, hardware-service, analytics-service, weather-service]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Verify ACR Login
        run: |
          echo "Registry: ${{ env.REGISTRY }}"
          echo "ACR_USERNAME is set: ${{ secrets.ACR_USERNAME != '' }}"
          echo "ACR_PASSWORD is set: ${{ secrets.ACR_PASSWORD != '' }}"
          docker info | grep -i "registry"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/agriwizard-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  docker-compose-test:
    name: Docker Compose Stack Test
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker compose build

      - run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 30

      - name: Health check - IAM Service
        run: curl -f http://localhost:8081/health

      - name: Health check - Hardware Service
        run: curl -f http://localhost:8082/health

      - name: Health check - Analytics Service
        run: curl -f http://localhost:8083/health

      - name: Health check - Weather Service
        run: curl -f http://localhost:8084/health

      - name: Health check - API Gateway
        run: |
          echo "Testing gateway health..."
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:9090/ping; then
              echo "✅ Gateway is healthy (ping on port 9090)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Gateway health check failed after 5 attempts"
          docker compose logs gateway
          exit 1

      - run: |
          curl -X POST http://localhost:8080/api/v1/iam/login \
          -H "Content-Type: application/json" \
          -d '{"email":"test@example.com","password":"password123"}' || true

      - run: curl -f http://localhost:8080/api/v1/iam/introspect

      - if: failure()
        run: docker compose logs

      - if: always()
        run: docker compose down -v

  gosec-scan:
    name: Gosec Security Analysis
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@v2.21.0
        with:
          args: "-no-fail -fmt json -out gosec-results.json ./services/..."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-results.json

  deployment-ready:
    name: Deployment Ready Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, docker-compose-test, sonarcloud]
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - run: |
          echo "✓ All checks passed"
          echo "✓ Images pushed to: Azure Container Registry (${{ env.REGISTRY }})"
          echo "✓ Ready for deployment to production"
          echo ""
          echo "Services:"
          echo "  - ${{ env.REGISTRY }}/agriwizard-iam-service:${{ github.sha }}"
          echo "  - ${{ env.REGISTRY }}/agriwizard-hardware-service:${{ github.sha }}"
          echo "  - ${{ env.REGISTRY }}/agriwizard-analytics-service:${{ github.sha }}"
          echo "  - ${{ env.REGISTRY }}/agriwizard-weather-service:${{ github.sha }}"
