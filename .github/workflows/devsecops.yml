name: CI/CD - AgriWizard DevSecOps Pipeline

on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main", "development"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  DOCKERHUB_USERNAME: agriwizard
  GO_VERSION: "1.26.1"

jobs:
  lint-and-fmt:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_path:
          - services/iam-service
          - services/hardware-service
          - services/analytics-service
          - services/weather-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: ${{ matrix.service_path }}
          args: --timeout=5m --config=../../.golangci.yml

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-fmt, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') && secrets.DOCKERHUB_TOKEN != ''
    strategy:
      matrix:
        service:
          [iam-service, hardware-service, analytics-service, weather-service]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Docker Hub login
        run: |
          echo "Testing Docker Hub connection..."
          docker info
          echo "Logged in as: ${{ secrets.DOCKERHUB_USERNAME }}"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/agriwizard-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Stack Test
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker compose build --no-cache

      - run: |
          docker compose up -d
          sleep 15

      - run: curl -f http://localhost:8081/health
      - run: curl -f http://localhost:8082/health
      - run: curl -f http://localhost:8083/health
      - run: curl -f http://localhost:8084/health
      - run: curl -f http://localhost:8080

      - run: |
          curl -X POST http://localhost:8080/api/v1/iam/login \
          -H "Content-Type: application/json" \
          -d '{"email":"test@example.com","password":"password123"}' || true

      - run: curl -f http://localhost:8080/api/v1/iam/introspect

      - if: failure()
        run: docker compose logs

      - if: always()
        run: docker compose down -v

  gosec-scan:
    name: Gosec Security Analysis
    runs-on: ubuntu-latest
    needs: lint-and-fmt
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@v2.21.0
        with:
          args: "-no-fail -fmt json -out gosec-results.json ./services/..."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-results.json

  deployment-ready:
    name: Deployment Ready Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, docker-compose-test, sonarcloud]
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - run: |
          echo "✓ All checks passed"
          echo "✓ Images pushed to: Docker Hub (${{ env.DOCKERHUB_USERNAME }}/agriwizard-*)"
          echo "✓ Ready for deployment to production"
          echo ""
          echo "Services:"
          echo "  - ${{ env.DOCKERHUB_USERNAME }}/agriwizard-iam-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKERHUB_USERNAME }}/agriwizard-hardware-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKERHUB_USERNAME }}/agriwizard-analytics-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKERHUB_USERNAME }}/agriwizard-weather-service:${{ github.sha }}"
