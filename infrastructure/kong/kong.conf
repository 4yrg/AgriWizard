# =============================================================================
# Kong Gateway Configuration (DB-less)
# =============================================================================

database = off

admin_api_uri = http://localhost:8001
admin_listen = 0.0.0.0:8001

proxy_listen = 0.0.0.0:8000
proxy_listen_ssl = 0.0.0.0:8443

nginx_proxy_proxy_buffer_size = 160k
nginx_proxy_proxy_buffers = 64 160k

real_ip_header = X-Forwarded-For
trusted_ips = 0.0.0.0/0

log_level = info
proxy_access_log = /dev/stdout
admin_access_log = /dev/stderr
proxy_error_log = /dev/stderr
admin_error_log = /dev/stderr

lua_socket_pool_size = 30

declarative_config = /etc/kong/kong.generated.yml
