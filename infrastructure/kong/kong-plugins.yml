# =============================================================================
# Kong Plugins Configuration (Legacy Reference)
# =============================================================================
# Active production config is now consolidated in `infrastructure/kong/kong.yml`
# for DB-less declarative deployment in ACA.
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# JWT Authentication Plugin
# =============================================================================
# Validates JWT tokens for authenticated service-to-service communication
# -----------------------------------------------------------------------------
plugins:
  - name: jwt
    route: iam-route
    config:
      uri_param_names:
        - jwt
      header_names:
        - Authorization
      claims_claims_verification:
        - exp
        - iat
      maximum_expiration: 3600

# Rate limiting per consumer (applied per-route via service)
  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      day: 10000
      policy: local
      fault_tolerant: true
      hide_client_headers: false
      redis_host: null
      redis_port: 6379
      redis_database: 0
      redis_password: null

# Request transformer for logging
  - name: request-transformer
    config:
      add:
        headers:
          - X-Gateway:Kong
          - X-Gateway-Version:3.4

# Response transformer
  - name: response-transformer
    config:
      add:
        headers:
          - X-Kong-Version:3.4
          - X-Api-Gateway:AgriWizard

