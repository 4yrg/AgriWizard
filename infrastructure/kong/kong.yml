        paths:
          - /api/v1/weather
        strip_path: true
      - name: weather-route
        paths:
          - /weather
        strip_path: true
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp

  - name: notification-service
    protocol: ${NOTIFICATION_UPSTREAM_PROTOCOL}
    host: ${NOTIFICATION_UPSTREAM_HOST}
    port: ${NOTIFICATION_UPSTREAM_PORT}
    path: /api/v1/notifications
    routes:
      - name: notification-route-legacy
        paths:
          - /api/v1/notifications
        strip_path: true
      - name: notification-route
        paths:
          - /notifications
        strip_path: true
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp

  - name: templates-service
    protocol: ${NOTIFICATION_UPSTREAM_PROTOCOL}
    host: ${NOTIFICATION_UPSTREAM_HOST}
