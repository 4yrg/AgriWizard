version: "3.9"

# =============================================================================
# Kong Gateway Only - DB-less mode
# =============================================================================
# Minimal Kong setup for production gateway
# Usage: docker compose -f docker-compose.kong.standalone.yml up -d
# =============================================================================

services:
  kong:
    build:
      context: ../..
      dockerfile: infrastructure/kong/Dockerfile
    container_name: agriwizard-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_LOG_LEVEL: info
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_JWT_SHARED_SECRET: ${KONG_JWT_SHARED_SECRET:-super-secret-jwt-key-change-in-production}
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
      IAM_UPSTREAM_HOST: ${IAM_UPSTREAM_HOST:-iam-service}
      IAM_UPSTREAM_PORT: ${IAM_UPSTREAM_PORT:-8081}
      HARDWARE_UPSTREAM_HOST: ${HARDWARE_UPSTREAM_HOST:-hardware-service}
      HARDWARE_UPSTREAM_PORT: ${HARDWARE_UPSTREAM_PORT:-8082}
      ANALYTICS_UPSTREAM_HOST: ${ANALYTICS_UPSTREAM_HOST:-analytics-service}
      ANALYTICS_UPSTREAM_PORT: ${ANALYTICS_UPSTREAM_PORT:-8083}
      WEATHER_UPSTREAM_HOST: ${WEATHER_UPSTREAM_HOST:-weather-service}
      WEATHER_UPSTREAM_PORT: ${WEATHER_UPSTREAM_PORT:-8084}
      NOTIFICATION_UPSTREAM_HOST: ${NOTIFICATION_UPSTREAM_HOST:-notification-service}
      NOTIFICATION_UPSTREAM_PORT: ${NOTIFICATION_UPSTREAM_PORT:-8085}
    ports:
      - "8000:8000"   # HTTP proxy
      - "8443:8443"   # HTTPS proxy  
      - "8001:8001"   # Admin API
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
